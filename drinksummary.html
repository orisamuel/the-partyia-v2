<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<title>הפרתיה — סיכום מכירות</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
<script src="utils.js"></script>
<style>
        .controls-section {
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
        }
        .mode-selector {
            display: flex; gap: 4px; margin-bottom: 20px;
            background: var(--bg-base); border-radius: var(--radius-md);
            padding: 4px;
        }
        .mode-btn {
            flex: 1; background: transparent; border: none;
            padding: 10px 14px; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: var(--t-fast); color: var(--text-secondary);
            font-family: inherit;
        }
        .mode-btn.active {
            background: var(--amber); color: #000;
            box-shadow: var(--shadow-amber);
        }
        .date-controls {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; align-items: end;
        }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.82rem; color: var(--text-secondary); font-weight: 600; }
        .generate-btn {
            background: var(--amber); color: #000; border: none;
            padding: 12px 24px; border-radius: var(--radius-md);
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
            transition: var(--t-fast); font-family: inherit;
        }
        
        .generate-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .results-section { display: none; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-elevated); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: var(--radius-lg); text-align: center;
            transition: var(--t-med);
        }
        .stat-card:hover { border-color: var(--amber-dim); transform: translateY(-2px); }
        .stat-number { font-size: 1.6rem; font-weight: 800; color: var(--amber); display: block; margin-bottom: 4px; }
        .stat-number.negative { color: var(--danger); }
        .stat-number.positive { color: var(--success); }
        .stat-label { font-size: 0.78rem; color: var(--text-secondary); font-weight: 600; }
        .stat-card.credits-card { border-color: rgba(239,68,68,0.3); }
        .stat-card.credits-card .stat-number { color: var(--danger); }
        .chart-section {
            background: var(--bg-elevated); border: 1px solid var(--glass-border);
            padding: 24px; border-radius: var(--radius-lg); margin-bottom: 24px;
        }
        .chart-title { font-size: 1.1rem; font-weight: 700; color: var(--amber); margin-bottom: 20px; text-align: center; }
        .chart-container { position: relative; width: 100%; height: 460px; display: flex; justify-content: center; align-items: center; }
        .chart-canvas { max-width: 100%; max-height: 460px; }
        .table-section {
            background: var(--bg-elevated); border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg); overflow: hidden;
        }
        .table-header {
            background: var(--amber-glow); border-bottom: 1px solid var(--amber-dim);
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .table-title { font-size: 1rem; font-weight: 700; color: var(--amber); }
        .export-btn {
            background: var(--amber); color: #000; border: none; padding: 8px 16px;
            border-radius: var(--radius-sm); cursor: pointer; font-size: 0.82rem;
            font-weight: 700; font-family: inherit; transition: var(--t-fast);
        }
        .export-btn:hover { opacity: 0.85; }
        .products-table { width: 100%; border-collapse: collapse; }
        .products-table th {
            background: var(--bg-base); color: var(--text-secondary);
            padding: 12px 16px; text-align: right; font-weight: 700; font-size: 0.82rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .products-table td { padding: 12px 16px; border-bottom: 1px solid var(--glass-border); vertical-align: middle; }
        .products-table tr:hover td { background: var(--glass-bg); }
        .product-main { font-weight: 700; color: var(--amber); font-size: 0.95rem; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .product-emoji { font-size: 1.2rem; }
        .product-details { font-size: 0.78rem; color: var(--text-muted); margin-right: 28px; line-height: 1.4; }
        .product-item { margin-bottom: 2px; }
        .product-item.credit { color: var(--danger); font-weight: 600; }
        .quantity-cell { font-size: 1.2rem; font-weight: 800; color: var(--amber); text-align: center; }
        .percentage-cell { color: var(--text-secondary); font-size: 0.95rem; font-weight: 600; text-align: center; }
        .revenue-cell { font-size: 1rem; font-weight: 700; color: var(--success); text-align: center; }
        .loading { text-align: center; padding: 48px; color: var(--text-muted); }
        .no-data { text-align: center; padding: 48px; color: var(--text-muted); }
        .error-message {
            background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.3);
            padding: 16px; border-radius: var(--radius-md); margin: 20px 0; text-align: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
  <header class="header">
    <a href="admin.html"><img src="logo.png" alt="לוגו" class="header-logo"></a>
    <div class="header-title">
      <h1>📈 סיכום מכירות</h1>
      <p>ניתוח מוצרים ואירועים</p>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
      <a href="admin.html" class="btn-back">← חזרה</a>
    </div>
  </header>

  <div class="page-body">
            <!-- בקרות -->
            <div class="controls-section">
                <div class="mode-selector">
                    <button class="mode-btn active" id="singleEventBtn">🎯 אירוע יחיד</button>
                    <button class="mode-btn" id="dateRangeBtn">📅 טווח תאריכים</button>
                    <button class="mode-btn" id="productAnalysisBtn">📈 ניתוח מוצר</button>
                </div>
                
                <div class="date-controls">
                    <!-- אירוע יחיד -->
                    <div class="input-group" id="singleDateGroup">
                        <label for="eventDate">תאריך האירוע:</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    
                    <!-- טווח תאריכים -->
                    <div class="input-group hidden" id="fromDateGroup">
                        <label for="fromDate">מתאריך:</label>
                        <input type="date" id="fromDate">
                    </div>
                    
                    <div class="input-group hidden" id="toDateGroup">
                        <label for="toDate">עד תאריך:</label>
                        <input type="date" id="toDate">
                    </div>
                    
                    <!-- ניתוח מוצר -->
                    <div class="input-group hidden" id="productSelectGroup">
                        <label for="productSelect">בחר מוצר:</label>
                        <select id="productSelect">
                            <option value="">טוען מוצרים...</option>
                        </select>
                    </div>
                    
                    <div class="input-group hidden" id="analysisFromDateGroup">
                        <label for="analysisFromDate">מתאריך:</label>
                        <input type="date" id="analysisFromDate">
                    </div>
                    
                    <div class="input-group hidden" id="analysisToDateGroup">
                        <label for="analysisToDate">עד תאריך:</label>
                        <input type="date" id="analysisToDate">
                    </div>
                    
                    <!-- כפתור -->
                    <div class="input-group">
                        <label>&nbsp;</label>
                        <button id="generateBtn" class="generate-btn">🔍 צור דוח</button>
                    </div>
                </div>
            </div>
            
            <!-- תוצאות -->
            <div class="results-section" id="resultsSection">
                <!-- סטטיסטיקות -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <span class="stat-number" id="totalProducts">0</span>
                        <div class="stat-label">סוגי מוצרים</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="totalQuantity">0</span>
                        <div class="stat-label">יחידות שנמכרו (נטו)</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="theoreticalRevenue">₪0</span>
                        <div class="stat-label">הכנסה תיאורטית</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number positive" id="actualRevenue">₪0</span>
                        <div class="stat-label">הכנסות בפועל</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number negative" id="totalDiscounts">₪0</span>
                        <div class="stat-label">הנחות ומבצעים</div>
                    </div>
                    <div class="stat-card credits-card">
                        <span class="stat-number" id="totalCredits">₪0</span>
                        <div class="stat-label">סה"כ זיכויים</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="totalEvents">0</span>
                        <div class="stat-label">אירועים</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number" id="topProduct">-</span>
                        <div class="stat-label">המוצר הנמכר ביותר</div>
                    </div>
                </div>
                
                <!-- גרף -->
                <div class="chart-section">
                    <div class="chart-title" id="chartTitle">התפלגות מכירות</div>
                    <div class="chart-container">
                        <canvas id="salesChart" class="chart-canvas"></canvas>
                    </div>
                </div>
                
                <!-- טבלה -->
                <div class="table-section" id="tableSection">
                    <div class="table-header">
                        <div class="table-title">פירוט מוצרים</div>
                        <button id="exportBtn" class="export-btn">📊 יצא לאקסל</button>
                    </div>
                    <table class="products-table">
                        <thead id="tableHead">
                            <tr>
                                <th style="width: 300px;">קטגוריית מוצר</th>
                                <th style="width: 100px;">כמות נטו</th>
                                <th style="width: 100px;">אחוז</th>
                                <th style="width: 120px;">הכנסות תיאורטיות</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <!-- הנתונים ייטענו כאן -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div id="loadingIndicator" class="loading" style="display: none;">
                טוען ומעבד נתונים...
            </div>
  </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
        
        // משתנים גלובליים
        let currentData = [];
        let productsData = {}; // מידע על מוצרים מהשרת
        let allProductsList = []; // רשימת כל המוצרים לבחירה
        let salesChart = null;
        let actualTotalRevenue = 0; // הכנסות ממשיות מהגליון הראשי
        let totalCreditsAmount = 0; // סכום הזיכויים - חדש!
        let currentMode = 'single'; // מצב נוכחי: single, range, analysis
        
        // הגדרות צבעים
        const COLORS = [
            '#E67E22', '#3498DB', '#2ECC71', '#E74C3C', '#9B59B6',
            '#F1C40F', '#1ABC9C', '#34495E', '#FF6B6B', '#4ECDC4'
        ];
        
        // הגדרות קיבוץ מוצרים
        const PRODUCT_GROUPS = {
            'יין': {
                keywords: ['יין'],
                name: 'יין (כל הסוגים)',
                emoji: '🍷',
                price: 25
            },
            'ויסקי': {
                keywords: ['ויסקי סאוור'],
                name: 'ויסקי סאוור (כל הסוגים)',
                emoji: '🥃',
                price: 30
            }
        };
        
        // אתחול הדף
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            warmupServer();

            // הגדרת תאריך היום
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('eventDate').value = today;
            document.getElementById('fromDate').value = today;
            document.getElementById('toDate').value = today;
            document.getElementById('analysisFromDate').value = today;
            document.getElementById('analysisToDate').value = today;
            
            // הגדרת Event Listeners
            setupEventListeners();
            
            // טעינת מידע מוצרים
            loadProductsInfo();
        });
        
        // הגדרת Event Listeners
        function setupEventListeners() {
            console.log('🔧 מגדיר Event Listeners');
            
            document.getElementById('singleEventBtn').addEventListener('click', () => setMode('single'));
            document.getElementById('dateRangeBtn').addEventListener('click', () => setMode('range'));
            document.getElementById('productAnalysisBtn').addEventListener('click', () => setMode('analysis'));
            document.getElementById('generateBtn').addEventListener('click', generateReport);
            document.getElementById('exportBtn').addEventListener('click', exportToExcel);
        }
        
        // החלפת מצב (אירוע יחיד / טווח / ניתוח מוצר)
        function setMode(mode) {
            console.log('📊 מחליף למצב:', mode);
            currentMode = mode;
            
            const singleBtn = document.getElementById('singleEventBtn');
            const rangeBtn = document.getElementById('dateRangeBtn');
            const analysisBtn = document.getElementById('productAnalysisBtn');
            
            const singleGroup = document.getElementById('singleDateGroup');
            const fromGroup = document.getElementById('fromDateGroup');
            const toGroup = document.getElementById('toDateGroup');
            const productGroup = document.getElementById('productSelectGroup');
            const analysisFromGroup = document.getElementById('analysisFromDateGroup');
            const analysisToGroup = document.getElementById('analysisToDateGroup');
            
            // איפוס כפתורים
            [singleBtn, rangeBtn, analysisBtn].forEach(btn => btn.classList.remove('active'));
            [singleGroup, fromGroup, toGroup, productGroup, analysisFromGroup, analysisToGroup].forEach(group => group.classList.add('hidden'));
            
            if (mode === 'single') {
                singleBtn.classList.add('active');
                singleGroup.classList.remove('hidden');
            } else if (mode === 'range') {
                rangeBtn.classList.add('active');
                fromGroup.classList.remove('hidden');
                toGroup.classList.remove('hidden');
            } else if (mode === 'analysis') {
                analysisBtn.classList.add('active');
                productGroup.classList.remove('hidden');
                analysisFromGroup.classList.remove('hidden');
                analysisToGroup.classList.remove('hidden');
            }
        }
        
        // טעינת מידע מוצרים - כולל לא פעילים
        async function loadProductsInfo() {
            console.log('📦 מנסה לטעון מידע מוצרים מהשרת (כולל לא פעילים)...');
            
            try {
                console.log('🔄 שולח בקשה לgetAllProductsForReports...');
                const result = await apiCall('getAllProductsForReports');
                if (result.success) {
                        allProductsList = [];
                        result.products.forEach(product => {
                            productsData[product.name] = {
                                emoji: product.emoji,
                                price: product.price,
                                category: product.category
                            };
                            allProductsList.push(product.name);
                        });
                        allProductsList.sort((a, b) => a.localeCompare(b, 'he'));
                        updateProductSelect();
                } else {
                    console.error('❌ שרת החזיר שגיאה:', result.message);
                }
            } catch (error) {
                console.error('❌ שגיאה בטעינת מידע מוצרים:', error);
            }
        }
        
        // עדכון dropdown בחירת מוצרים
        function updateProductSelect() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="">בחר מוצר...</option>';
            
            allProductsList.forEach(productName => {
                const option = document.createElement('option');
                option.value = productName;
                option.textContent = `${productsData[productName]?.emoji || '🍽️'} ${productName}`;
                select.appendChild(option);
            });
        }
        
        // יצירת דוח
        async function generateReport() {
            console.log('🔍 מתחיל יצירת דוח...');
            
            if (currentMode === 'single') {
                const eventDate = document.getElementById('eventDate').value;
                if (!eventDate) {
                    showToast('אנא בחר תאריך אירוע', 'error');
                    return;
                }
                await generateSingleEventReport(eventDate);
            } else if (currentMode === 'range') {
                const fromDate = document.getElementById('fromDate').value;
                const toDate = document.getElementById('toDate').value;
                if (!fromDate || !toDate) {
                    showToast('אנא בחר טווח תאריכים', 'error');
                    return;
                }
                if (new Date(fromDate) > new Date(toDate)) {
                    showToast('תאריך ההתחלה צריך להיות לפני תאריך הסיום', 'error');
                    return;
                }
                await generateDateRangeReport(fromDate, toDate);
            } else if (currentMode === 'analysis') {
                const productName = document.getElementById('productSelect').value;
                const fromDate = document.getElementById('analysisFromDate').value;
                const toDate = document.getElementById('analysisToDate').value;
                if (!productName) {
                    showToast('אנא בחר מוצר לניתוח', 'error');
                    return;
                }
                if (!fromDate || !toDate) {
                    showToast('אנא בחר טווח תאריכים', 'error');
                    return;
                }
                if (new Date(fromDate) > new Date(toDate)) {
                    showToast('תאריך ההתחלה צריך להיות לפני תאריך הסיום', 'error');
                    return;
                }
                await generateProductAnalysisReport(productName, fromDate, toDate);
            }
        }
        
        // דוח אירוע יחיד
        async function generateSingleEventReport(eventDate) {
            showLoading(true);
            
            try {
                const orders = await fetchOrdersData(true, eventDate, null, null);
                currentData = processProductsData(orders);
                displayResults(orders, true);
            } catch (error) {
                console.error('❌ שגיאה ביצירת הדוח:', error);
                showError('שגיאה בטעינת הנתונים: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        // דוח טווח תאריכים
        async function generateDateRangeReport(fromDate, toDate) {
            showLoading(true);
            
            try {
                const orders = await fetchOrdersData(false, null, fromDate, toDate);
                currentData = processProductsData(orders);
                displayResults(orders, false);
            } catch (error) {
                console.error('❌ שגיאה ביצירת הדוח:', error);
                showError('שגיאה בטעינת הנתונים: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        // דוח ניתוח מוצר לאורך זמן
        async function generateProductAnalysisReport(productName, fromDate, toDate) {
            showLoading(true);
            
            try {
                const orders = await fetchOrdersData(false, null, fromDate, toDate);
                
                // סינון הזמנות שמכילות את המוצר
                const relevantOrders = orders.filter(order => {
                    const products = (order.products || '').toLowerCase();
                    return products.includes(productName.toLowerCase());
                });
                
                console.log(`🔍 נמצאו ${relevantOrders.length} הזמנות עם המוצר ${productName}`);
                
                // עיבוד נתונים לפי תאריכים
                const dateData = processProductByDates(relevantOrders, productName, fromDate, toDate);
                currentData = dateData;
                
                displayProductAnalysisResults(productName, dateData, fromDate, toDate);
                
            } catch (error) {
                console.error('❌ שגיאה ביצירת דוח ניתוח מוצר:', error);
                showError('שגיאה בטעינת הנתונים: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        // עיבוד נתוני מוצר לפי תאריכים
        function processProductByDates(orders, productName, fromDate, toDate) {
            const dateMap = {};
            const productInfo = productsData[productName];
            
            // יצירת כל התאריכים בטווח
            const start = new Date(fromDate);
            const end = new Date(toDate);
            const current = new Date(start);
            
            while (current <= end) {
                const dateStr = current.toISOString().split('T')[0];
                dateMap[dateStr] = {
                    date: dateStr,
                    dateFormatted: current.toLocaleDateString('he-IL', { 
                        day: 'numeric', 
                        month: 'short',
                        weekday: 'short' 
                    }),
                    quantity: 0,
                    revenue: 0
                };
                current.setDate(current.getDate() + 1);
            }
            
            // מילוי הנתונים מההזמנות
            orders.forEach(order => {
                const orderDate = getOrderDateForAnalysis(order.date, order.time);
                if (!orderDate || !dateMap[orderDate]) return;
                
                const products = (order.products || '').split(', ');
                const isCredit = order.orderType === 'זיכוי';
                
                products.forEach(productStr => {
                    const product = productStr.trim();
                    
                    if (product.toLowerCase().includes(productName.toLowerCase())) {
                        // חילוץ כמות
                        const quantityMatch = product.match(/^(?:זיכוי:\s*)?(.+?)\s*\((-?\d+)\)$/);
                        let quantity = 1;
                        
                        if (quantityMatch) {
                            quantity = parseInt(quantityMatch[2]);
                        }
                        
                        // אם זה זיכוי, הופכים לשלילי
                        if (isCredit) {
                            quantity = -Math.abs(quantity);
                        }
                        
                        dateMap[orderDate].quantity += quantity;
                        dateMap[orderDate].revenue += quantity * (productInfo?.price || 0);
                    }
                });
            });
            
            // המרה למערך מסודר
            return Object.values(dateMap).sort((a, b) => a.date.localeCompare(b.date));
        }
        
        // קבלת תאריך הזמנה לניתוח
        function getOrderDateForAnalysis(dateStr, timeStr) {
            try {
                let orderDate;
                
                if (dateStr.includes('GMT') || dateStr.includes('00:00:00')) {
                    orderDate = new Date(dateStr);
                } else if (dateStr.includes('/')) {
                    const [day, month, year] = dateStr.split('/').map(Number);
                    orderDate = new Date(year, month - 1, day);
                } else {
                    return null;
                }
                
                // טיפול בהזמנות לילה (עד 6:00)
                if (timeStr) {
                    const timeMatch = timeStr.toString().match(/(\d{1,2}):(\d{2})/);
                    if (timeMatch) {
                        const hour = parseInt(timeMatch[1]);
                        if (hour >= 0 && hour < 6) {
                            orderDate.setDate(orderDate.getDate() - 1);
                        }
                    }
                }
                
                return orderDate.toISOString().split('T')[0];
            } catch (error) {
                console.error('שגיאה בפרסור תאריך:', error);
                return null;
            }
        }
        
        // שליפת נתוני הזמנות - תמיד מהגיליון הראשי עם סינון בדיקות
        async function fetchOrdersData(isSingleMode, eventDate, fromDate, toDate) {
            console.log('🌐 שואב את כל הנתונים מהשרת (עם סינון בדיקות)...');
            
            const result = await apiCall('getRecentOrdersFromMain', { limit: 10000 });
            if (!result.success) {
                throw new Error(result.message || 'שגיאה לא ידועה');
            }

            let orders = result.orders || [];
            console.log('📦 התקבלו', orders.length, 'הזמנות גולמיות');
            
            // סינון 1: הזמנות בדיקה
            orders = orders.filter(order => {
                const customerName = (order.customerName || '').trim().toLowerCase();
                const isTestOrder = customerName.includes('בדיק');
                if (isTestOrder) {
                    console.log('🚫 מסנן הזמנת בדיקה:', customerName);
                }
                return !isTestOrder;
            });
            console.log('✅ אחרי סינון בדיקות:', orders.length, 'הזמנות');
            
            // סינון 2: תאריכים
            if (isSingleMode && eventDate) {
                orders = filterByEventDate(orders, eventDate);
            } else if (!isSingleMode && fromDate && toDate) {
                orders = filterByDateRange(orders, fromDate, toDate);
            }
            
            console.log('🎉 הזמנות סופיות:', orders.length);
            return orders;
        }
        
        // פילטור לפי אירוע יחיד (כולל הזמנות לילה)
        function filterByEventDate(orders, targetDate) {
            const [targetYear, targetMonth, targetDay] = targetDate.split('-').map(Number);
            const targetDateObj = new Date(targetYear, targetMonth - 1, targetDay);
            
            const nextDay = new Date(targetDateObj);
            nextDay.setDate(nextDay.getDate() + 1);
            
            const targetDateStr = `${targetDay.toString().padStart(2, '0')}/${targetMonth.toString().padStart(2, '0')}/${targetYear}`;
            const nextDayStr = `${nextDay.getDate().toString().padStart(2, '0')}/${(nextDay.getMonth() + 1).toString().padStart(2, '0')}/${nextDay.getFullYear()}`;
            
            return orders.filter(order => {
                const orderDateStr = order.date;
                const orderTime = order.time;
                
                if (!orderDateStr || !orderTime) return false;
                
                let orderDateFormatted;
                
                if (orderDateStr.includes('GMT') || orderDateStr.includes('00:00:00')) {
                    const orderDate = new Date(orderDateStr);
                    const day = orderDate.getDate().toString().padStart(2, '0');
                    const month = (orderDate.getMonth() + 1).toString().padStart(2, '0');
                    const year = orderDate.getFullYear();
                    orderDateFormatted = `${day}/${month}/${year}`;
                } else if (orderDateStr.includes('/')) {
                    orderDateFormatted = orderDateStr;
                } else {
                    return false;
                }
                
                // הזמנות מהתאריך הראשי
                if (orderDateFormatted === targetDateStr) {
                    return true;
                }
                
                // הזמנות לילה מהיום שאחרי
                if (orderDateFormatted === nextDayStr) {
                    const timeMatch = orderTime.toString().match(/(\d{1,2}):(\d{2})/);
                    if (timeMatch) {
                        const hour = parseInt(timeMatch[1]);
                        if (hour >= 0 && hour < 6) {
                            return true;
                        }
                    }
                }
                
                return false;
            });
        }
        
        // פילטור לפי טווח תאריכים
        function filterByDateRange(orders, fromDate, toDate) {
            const fromDateObj = new Date(fromDate);
            const toDateObj = new Date(toDate);
            
            return orders.filter(order => {
                try {
                    const orderDateStr = order.date || '';
                    if (!orderDateStr) return false;
                    
                    let orderDate;
                    
                    if (orderDateStr.includes('GMT') || orderDateStr.includes('00:00:00')) {
                        orderDate = new Date(orderDateStr);
                    } else if (orderDateStr.includes('/')) {
                        const dateParts = orderDateStr.split('/');
                        if (dateParts.length !== 3) return false;
                        const [day, month, year] = dateParts.map(Number);
                        orderDate = new Date(year, month - 1, day);
                    } else {
                        return false;
                    }
                    
                    if (isNaN(orderDate.getTime())) return false;
                    
                    return orderDate >= fromDateObj && orderDate <= toDateObj;
                } catch (e) {
                    return false;
                }
            });
        }
        
        // עיבוד נתוני מוצרים - עם חישוב נכון של הכנסות ממשיות והנחות + זיכויים
        function processProductsData(orders) {
            console.log('⚙️ מתחיל עיבוד נתוני מוצרים עם טיפול בזיכויים...');
            
            const productCounts = {};
            const productDetails = {};
            const creditDetails = {}; // פירוט זיכויים לכל מוצר - חדש!
            
            // חישוב הכנסות ממשיות וזיכויים
            actualTotalRevenue = 0;
            totalCreditsAmount = 0;
            
            orders.forEach(order => {
                const total = parseInt(order.total) || 0;
                const isCredit = order.orderType === 'זיכוי';
                
                if (isCredit) {
                    totalCreditsAmount += Math.abs(total);
                } else {
                    actualTotalRevenue += total;
                }
            });
            
            console.log('💰 סה"כ הכנסות ממשיות:', actualTotalRevenue, '₪');
            console.log('💳 סה"כ זיכויים:', totalCreditsAmount, '₪');
            
            orders.forEach(order => {
                const products = (order.products || '').split(', ');
                const isCredit = order.orderType === 'זיכוי';
                
                products.forEach(productStr => {
                    const product = productStr.trim();
                    
                    // דילוג על פריטים שאינם מוצרים פיזיים
                    if (!product || product.includes('₪') || product.includes('טיפ') || 
                        product.toLowerCase().includes('הנחה') || product.toLowerCase().includes('סכום חופשי')) {
                        return;
                    }
                    
                    // ניקוי "זיכוי:" מתחילת השם
                    let cleanProduct = product.replace(/^זיכוי:\s*/i, '');
                    
                    // חילוץ כמות
                    const quantityMatch = cleanProduct.match(/^(.+?)\s*\((-?\d+)\)$/);
                    let productName, quantity;
                    
                    if (quantityMatch) {
                        productName = quantityMatch[1].trim();
                        quantity = parseInt(quantityMatch[2]);
                    } else {
                        productName = cleanProduct;
                        quantity = 1;
                    }
                    
                    // קיבוץ מוצרים
                    const groupInfo = getProductGroup(productName);
                    const groupName = groupInfo.name;
                    
                    // אם זה זיכוי - כמות שלילית
                    if (isCredit) {
                        quantity = -Math.abs(quantity);
                        
                        // שמירת פירוט זיכויים
                        if (!creditDetails[groupName]) {
                            creditDetails[groupName] = {};
                        }
                        creditDetails[groupName][productName] = (creditDetails[groupName][productName] || 0) + Math.abs(quantity);
                    }
                    
                    // עדכון כמויות כלליות (חיובי או שלילי)
                    productCounts[groupName] = (productCounts[groupName] || 0) + quantity;
                    
                    // עדכון פירוט (רק מכירות רגילות)
                    if (!isCredit) {
                        if (!productDetails[groupName]) {
                            productDetails[groupName] = {};
                        }
                        productDetails[groupName][productName] = (productDetails[groupName][productName] || 0) + quantity;
                    }
                });
            });
            
            // המרה למערך מסודר עם הכנסות תיאורטיות
            const productsArray = Object.entries(productCounts)
                .filter(([groupName, totalCount]) => totalCount !== 0) // מסנן מוצרים עם כמות 0
                .map(([groupName, totalCount]) => {
                    const groupInfo = getProductGroupByName(groupName);
                    const theoreticalRevenue = Math.max(0, totalCount * groupInfo.price); // רק על כמות חיובית
                    
                    return {
                        name: groupName,
                        quantity: totalCount, // יכול להיות שלילי אם יותר זיכויים ממכירות
                        theoreticalRevenue: theoreticalRevenue,
                        emoji: groupInfo.emoji,
                        price: groupInfo.price,
                        details: productDetails[groupName] || {},
                        creditDetails: creditDetails[groupName] || {} // פירוט זיכויים - חדש!
                    };
                });
            
            // מיון לפי כמות (יורד) - כמות נטו
            return productsArray.sort((a, b) => b.quantity - a.quantity);
        }
        
        // קביעת קבוצת מוצר
        function getProductGroup(productName) {
            const nameLower = productName.toLowerCase();
            
            // חיפוש בקבוצות מוגדרות
            for (const [key, group] of Object.entries(PRODUCT_GROUPS)) {
                for (const keyword of group.keywords) {
                    if (nameLower.includes(keyword.toLowerCase())) {
                        return group;
                    }
                }
            }
            
            // מוצר יחיד
            const productInfo = productsData[productName];
            
            return {
                name: productName,
                emoji: productInfo?.emoji || '🍽️',
                price: productInfo?.price || 0
            };
        }
        
        // קבלת מידע קבוצה לפי שם
        function getProductGroupByName(groupName) {
            // חיפוש בקבוצות מוגדרות
            for (const group of Object.values(PRODUCT_GROUPS)) {
                if (group.name === groupName) {
                    return group;
                }
            }
            
            // מוצר יחיד
            const productInfo = productsData[groupName];
            return {
                name: groupName,
                emoji: productInfo?.emoji || '🍽️',
                price: productInfo?.price || 0
            };
        }
        
        // ספירת אירועים ייחודיים
        function countUniqueEvents(orders) {
            const uniqueEventDates = new Set();
            
            orders.forEach(order => {
                if (!order.date || !order.time) return;
                
                const eventDate = getCorrectEventDate(order.date, order.time);
                uniqueEventDates.add(eventDate);
            });
            
            return uniqueEventDates.size;
        }
        
        // קביעת התאריך הנכון של האירוע
        function getCorrectEventDate(dateStr, timeStr) {
            try {
                let orderDate;
                let orderDateFormatted;
                
                if (dateStr.includes('GMT') || dateStr.includes('00:00:00')) {
                    orderDate = new Date(dateStr);
                    const day = orderDate.getDate().toString().padStart(2, '0');
                    const month = (orderDate.getMonth() + 1).toString().padStart(2, '0');
                    const year = orderDate.getFullYear();
                    orderDateFormatted = `${day}/${month}/${year}`;
                } else if (dateStr.includes('/')) {
                    orderDateFormatted = dateStr;
                    const [day, month, year] = dateStr.split('/').map(Number);
                    orderDate = new Date(year, month - 1, day);
                } else {
                    return dateStr;
                }
                
                const timeMatch = timeStr.toString().match(/(\d{1,2}):(\d{2})/);
                if (!timeMatch) {
                    return orderDateFormatted;
                }
                
                const hour = parseInt(timeMatch[1]);
                
                if (hour >= 0 && hour < 6) {
                    orderDate.setDate(orderDate.getDate() - 1);
                    const correctedDate = `${orderDate.getDate().toString().padStart(2, '0')}/${(orderDate.getMonth() + 1).toString().padStart(2, '0')}/${orderDate.getFullYear()}`;
                    return correctedDate;
                }
                
                return orderDateFormatted;
                
            } catch (error) {
                console.error('שגיאה בקביעת תאריך אירוע:', error);
                return dateStr;
            }
        }

                const totalDiscounts = Math.max(0, theoreticalRevenue - actualTotalRevenue - totalCreditsAmount);
                
                const summaryData = [
                    { 'סטטיסטיקה': 'הכנסה תיאורטית', 'ערך': `₪${theoreticalRevenue.toLocaleString()}` },
                    { 'סטטיסטיקה': 'הכנסות בפועל', 'ערך': `₪${actualTotalRevenue.toLocaleString()}` },
                    { 'סטטיסטיקה': 'סה"כ זיכויים', 'ערך': `₪${totalCreditsAmount.toLocaleString()}` },
                    { 'סטטיסטיקה': 'הנחות ומבצעים', 'ערך': `₪${totalDiscounts.toLocaleString()}` },
                    { 'סטטיסטיקה': 'יחידות שנמכרו (נטו)', 'ערך': totalPositiveQuantity.toLocaleString() }
                ];
                
                exportData = currentData.map(item => {
                    const percentage = totalPositiveQuantity > 0 && item.quantity > 0 ? 
                        ((item.quantity / totalPositiveQuantity) * 100).toFixed(1) : 0;
                    
                    const salesDetails = Object.entries(item.details)
                        .map(([name, count]) => `${name}: ${count}`)
                        .join('; ');
                    
                    const creditDetails = Object.entries(item.creditDetails)
                        .map(([name, count]) => `זיכוי ${name}: -${count}`)
                        .join('; ');
                    
                    const allDetails = [salesDetails, creditDetails].filter(d => d).join('; ');
                    
                    return {
                        'קטגוריה': item.name,
                        'פירוט': allDetails || item.name,
                        'כמות נטו': item.quantity,
                        'אחוז': `${percentage}%`,
                        'הכנסות תיאורטיות': item.theoreticalRevenue,
                        'מחיר ממוצע': item.price
                    };
                });
                
                const wb = XLSX.utils.book_new();
                const wsSummary = XLSX.utils.json_to_sheet(summaryData);
                XLSX.utils.book_append_sheet(wb, wsSummary, 'סיכום');
                
                const wsProducts = XLSX.utils.json_to_sheet(exportData);
                XLSX.utils.book_append_sheet(wb, wsProducts, 'מוצרים');
                
                [wsSummary, wsProducts].forEach(ws => {
                    if (!ws['!worksheetOptions']) ws['!worksheetOptions'] = {};
                    ws['!worksheetOptions']['rightToLeft'] = true;
                });
                
                if (currentMode === 'single') {
                    const eventDate = document.getElementById('eventDate').value;
                    fileName = `פרתיה_מוצרים_אירוע_${eventDate}.xlsx`;
                } else {
                    const fromDate = document.getElementById('fromDate').value;
                    const toDate = document.getElementById('toDate').value;
                    fileName = `פרתיה_מוצרים_${fromDate}_עד_${toDate}.xlsx`;
                }
                
                XLSX.writeFile(wb, fileName);
                return;
            }
            
            // יצוא פשוט לניתוח מוצר
            const ws = XLSX.utils.json_to_sheet(exportData);
            if (!ws['!worksheetOptions']) ws['!worksheetOptions'] = {};
            ws['!worksheetOptions']['rightToLeft'] = true;
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'ניתוח מוצר');
            XLSX.writeFile(wb, fileName);
        }
        
        // פונקציות עזר
        function showLoading(show) {
            const loading = document.getElementById('loadingIndicator');
            const results = document.getElementById('resultsSection');
            const generateBtn = document.getElementById('generateBtn');
            
            if (show) {
                loading.style.display = 'block';
                results.style.display = 'none';
                generateBtn.disabled = true;
            } else {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        }
        
        function showError(message) {
            const results = document.getElementById('resultsSection');
            results.innerHTML = `<div class="error-message">${message}</div>`;
            results.style.display = 'block';
        }
    </script>
</body>
</html>
