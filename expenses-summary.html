<head>
<meta charset="UTF-8">

<style>

        .controls {
            background: var(--bg-elevated); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: var(--radius-lg); margin-bottom: 20px;
        }
        .mode-selector {
            display: flex; gap: 4px; margin-bottom: 16px;
            background: var(--bg-base); border-radius: var(--radius-md); padding: 4px;
            max-width: 340px;
        }
        .mode-btn {
            flex: 1; background: transparent; border: none; padding: 9px 14px;
            border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: var(--t-fast); color: var(--text-secondary);
            font-family: inherit;
        }
        .mode-btn.active { background: var(--amber); color: #000; box-shadow: var(--shadow-amber); }
        .controls-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; align-items: end; }
        .date-range-group { display: flex; gap: 12px; align-items: end; }
        .hidden { display: none; }
        .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .toggle-detail {
            background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--glass-border);
            padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem;
            font-family: inherit; transition: var(--t-fast);
        }
        .toggle-detail:hover { border-color: var(--amber); color: var(--amber); }
        .export-btn {
            background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3);
            padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem;
            font-family: inherit; font-weight: 600; transition: var(--t-fast);
        }
        .export-btn:hover { background: var(--success); color: #000; }
        .export-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .generate-btn {
            background: var(--amber); color: #000; border: none; padding: 10px 20px;
            border-radius: var(--radius-md); font-weight: 700; cursor: pointer;
            transition: var(--t-fast); font-family: inherit; height: fit-content;
        }
        .generate-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .results-section { display: none; }
        .summary-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .stat-card {
            background: var(--bg-elevated); border: 1px solid var(--glass-border);
            padding: 18px; border-radius: var(--radius-lg); text-align: center;
        }
        .stat-number { font-size: 1.5rem; font-weight: 800; color: var(--amber); margin-bottom: 4px; display: block; }
        .stat-label { font-size: 0.78rem; color: var(--text-secondary); font-weight: 600; }
        .stat-card.credits-card { border-color: rgba(239,68,68,0.3); }
        .stat-card.credits-card .stat-number { color: var(--danger); }
        .table-container {
            background: var(--bg-elevated); border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg); overflow: hidden;
        }
        .expenses-table { width: 100%; border-collapse: collapse; }
        .expenses-table th {
            background: var(--bg-base); color: var(--text-secondary);
            padding: 12px; text-align: right; font-weight: 700; font-size: 0.8rem;
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 10;
        }
        .expenses-table td { padding: 10px 12px; border-bottom: 1px solid var(--glass-border); vertical-align: top; }
        .expenses-table tr:hover td { background: var(--glass-bg); }
        .resident-name { font-weight: 700; color: var(--text-primary); }
        .residence-type { font-size: 0.75rem; color: var(--text-muted); font-style: italic; }
        .event-date { font-weight: 700; color: var(--amber); font-size: 0.85rem; }
        .order-details { font-size: 0.78rem; line-height: 1.4; color: var(--text-secondary); }
        .order-details.hidden { display: none; }
        .order-type-badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
        .order-type-badge.credit { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
        .order-type-badge.regular { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
        .total-amount { font-weight: 700; color: var(--amber); font-size: 0.95rem; }
        .total-amount.negative { color: var(--danger); }
        .total-amount.positive { color: var(--success); }
        .loading { text-align: center; padding: 48px; color: var(--text-muted); }
        .error-message { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); padding: 14px; border-radius: var(--radius-md); margin: 16px 0; }
        .no-data { text-align: center; padding: 48px; color: var(--text-muted); }
    </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
        
        let currentData = [];
        let showDetails = false;
        
        // פונקציה לניקוי תאריך (מועתקת מorders.html)
        function cleanDate(dateStr) {
            if (!dateStr) return 'לא צוין';
            
            const str = dateStr.toString();
            
            // אם יש GMT, זה Date object שהומר למחרוזת
            if (str.includes('GMT')) {
                // נחפש דפוס של תאריך בסגנון "Mon Jun 30 2025"
                const dateMatch = str.match(/(\w{3})\s+(\w{3})\s+(\d{1,2})\s+(\d{4})/);
                if (dateMatch) {
                    const [, dayName, month, day, year] = dateMatch;
                    
                    // המרת חודש לספרות
                    const months = {
                        'Jan': '01', 'Feb': '02', 'Mar': '03', 'Apr': '04',
                        'May': '05', 'Jun': '06', 'Jul': '07', 'Aug': '08',
                        'Sep': '09', 'Oct': '10', 'Nov': '11', 'Dec': '12'
                    };
                    
                    const monthNum = months[month] || month;
                    return `${day.padStart(2, '0')}/${monthNum}/${year}`;
                }
            }
            
            // אם זה כבר נראה כמו תאריך רגיל, נחזיר כמו שזה
            return str;
        }
        
        // פונקציה לניקוי שעה (מועתקת מorders.html)
        function cleanTime(timeStr) {
            if (!timeStr) return 'לא צוין';
            
            const str = timeStr.toString();
            
            // נחפש דפוס של שעה:דקה:שניה
            const timeMatch = str.match(/(\d{1,2}):(\d{2}):(\d{2})/);
            if (timeMatch) {
                return `${timeMatch[1].padStart(2, '0')}:${timeMatch[2]}`;
            }
            
            // אם זה כבר נראה כמו שעה רגילה, נחזיר כמו שזה
            return str;
        }
        
        // פונקציה להמרת תאריך לפורמט יפה
        function formatDateNice(dateStr) {
            try {
                const [day, month, year] = dateStr.split('/');
                const date = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                return date.toLocaleDateString('he-IL', { 
                    day: 'numeric', 
                    month: 'short',
                    weekday: 'short'
                });
            } catch (error) {
                return dateStr;
            }
        }
        
        // פונקציה לקביעת התאריך הנכון של האירוע (עם טיפול בהזמנות לילה)
        function getCorrectEventDate(dateStr, timeStr) {
            const cleanedDate = cleanDate(dateStr);
            const cleanedTime = cleanTime(timeStr);
            
            console.log('קובע תאריך נכון עבור:', cleanedDate, cleanedTime);
            
            try {
                // פרסור התאריך והשעה
                const dateMatch = cleanedDate.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
                const timeMatch = cleanedTime.match(/(\d{1,2}):(\d{2})/);
                
                if (!dateMatch || !timeMatch) {
                    console.log('לא הצלחתי לפרסר תאריך/שעה:', cleanedDate, cleanedTime);
                    return cleanedDate; // מחזיר את התאריך המקורי אם לא הצליח לפרסר
                }
                
                const [, day, month, year] = dateMatch;
                const [, hour, minute] = timeMatch;
                
                const orderHour = parseInt(hour);
                
                // אם ההזמנה בין חצות ל-6:00 - נקצה אותה ליום הקודם
                if (orderHour >= 0 && orderHour < 6) {
                    console.log('הזמנת לילה - מקצה ליום הקודם');
                    
                    // יצירת תאריך וחיסור יום אחד
                    const orderDate = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                    orderDate.setDate(orderDate.getDate() - 1); // יום אחורה
                    
                    // פורמט החזרה
                    const correctedDate = `${orderDate.getDate().toString().padStart(2, '0')}/${(orderDate.getMonth() + 1).toString().padStart(2, '0')}/${orderDate.getFullYear()}`;
                    console.log('תאריך מתוקן:', correctedDate);
                    return correctedDate;
                }
                
                console.log('הזמנה רגילה - משאיר תאריך מקורי:', cleanedDate);
                return cleanedDate; // הזמנה רגילה - משאיר את התאריך המקורי
                
            } catch (error) {
                console.error('שגיאה בקביעת תאריך נכון:', error);
                return cleanedDate; // במקרה של שגיאה, מחזיר את התאריך המקורי
            }
        }
        
        // עזר: כתיבה ללוח דיבאג
        function dbg(msg) {
            const panel = document.getElementById('debugPanel');
            if (panel) panel.innerHTML += `<div>${msg}</div>`;
            console.log('[expenses]', msg);
        }

        // שליפת נתוני הזמנות
        async function fetchOrdersData(isSingleMode, eventDate, fromDate, toDate) {
            // איפוס לוח דיבאג
            const panel = document.getElementById('debugPanel');
            if (panel) { panel.innerHTML = ''; panel.style.display = 'block'; }

            try {
                let allOrders;

                if (isSingleMode) {
                    // סינון בשרת — מדויק, ללא בעיות timezone/פורמט
                    dbg(`📡 getOrdersByEvent(${eventDate})`);
                    const res = await apiCall('getOrdersByEvent', { eventDate });
                    if (!res.success) throw new Error(res.message || 'שגיאה לא ידועה');
                    allOrders = res.orders || [];
                } else {
                    // כל ההזמנות, סינון תאריך בצד הלקוח
                    dbg(`📡 getRecentOrdersFromMain(1000) — טווח ${fromDate} עד ${toDate}`);
                    const res = await apiCall('getRecentOrdersFromMain', { limit: 1000 });
                    if (!res.success) throw new Error(res.message || 'שגיאה לא ידועה');
                    allOrders = res.orders || [];
                }

                dbg(`📦 התקבלו ${allOrders.length} הזמנות מהשרת`);
                if (allOrders.length > 0) {
                    const s = allOrders[0];
                    dbg(`📅 ראשונה: date="${s.date}" time="${s.time}" name="${s.customerName}"`);
                } else {
                    // בדוק כמה שורות בכלל יש בגיליון
                    const diag = await apiCall('getRecentOrdersFromMain', { limit: 5 });
                    const total = (diag.orders || []).length;
                    dbg(`🔍 בגיליון סיכום הזמנות: ${total} שורות בסה"כ (מקסימום 5 מוצגות)`);
                    if (total > 0) dbg(`📅 דוגמה: date="${diag.orders[0].date}" name="${diag.orders[0].customerName}"`);
                }

                // סינון הזמנות בדיקה
                const real = allOrders.filter(o => !(o.customerName || '').includes('בדיק'));
                dbg(`✅ אחרי סינון בדיקות: ${real.length}`);

                if (isSingleMode) {
                    dbg(`✅ אירוע יחיד — הסינון בוצע בשרת, מחזיר ${real.length}`);
                    return real;
                }

                const filtered = filterByDateRange(real, fromDate, toDate);
                dbg(`✅ אחרי סינון טווח: ${filtered.length}`);
                return filtered;

            } catch (error) {
                dbg(`❌ שגיאה: ${error.message}`);
                throw error;
            }
        }
        
        // פילטור לפי אירוע יחיד (כולל הזמנות לילה)
        function filterByEventDate(orders, targetDate) {
            const [targetYear, targetMonth, targetDay] = targetDate.split('-').map(Number);
            const targetDateObj = new Date(targetYear, targetMonth - 1, targetDay);
            
            // חישוב התאריך שאחרי (לבדיקת הזמנות לילה)
            const nextDay = new Date(targetDateObj);
            nextDay.setDate(nextDay.getDate() + 1);
            
            const targetDateStr = `${targetDay.toString().padStart(2, '0')}/${targetMonth.toString().padStart(2, '0')}/${targetYear}`;
            const nextDayStr = `${nextDay.getDate().toString().padStart(2, '0')}/${(nextDay.getMonth() + 1).toString().padStart(2, '0')}/${nextDay.getFullYear()}`;
            
            console.log('מחפש הזמנות עבור אירוע:', targetDateStr);
            console.log('כולל הזמנות לילה מ:', nextDayStr, '(עד 06:00)');
            
            return orders.filter(order => {
                const orderDateStr = order.date;
                const orderTime = order.time;

                if (!orderDateStr) return false;
                
                let orderDate;
                let orderDateFormatted;
                
                // זיהוי פורמט התאריך
                if (orderDateStr.includes('GMT') || orderDateStr.includes('00:00:00')) {
                    // פורמט Date object
                    orderDate = new Date(orderDateStr);
                    const day = orderDate.getDate().toString().padStart(2, '0');
                    const month = (orderDate.getMonth() + 1).toString().padStart(2, '0');
                    const year = orderDate.getFullYear();
                    orderDateFormatted = `${day}/${month}/${year}`;
                } else if (orderDateStr.includes('/')) {
                    // פורמט DD/MM/YYYY
                    orderDateFormatted = orderDateStr;
                    const [day, month, year] = orderDateStr.split('/').map(Number);
                    orderDate = new Date(year, month - 1, day);
                } else {
                    return false;
                }
                
                // הזמנות מהתאריך הראשי
                if (orderDateFormatted === targetDateStr) {
                    console.log('הזמנה מהתאריך הרגיל:', order.customerName, orderTime);
                    return true;
                }
                
                // הזמנות לילה מהיום שאחרי
                if (orderDateFormatted === nextDayStr && orderTime) {
                    const timeMatch = orderTime.toString().match(/(\d{1,2}):(\d{2})/);
                    if (timeMatch) {
                        const hour = parseInt(timeMatch[1]);
                        if (hour >= 0 && hour < 6) {
                            console.log('הזמנת לילה מהיום שאחרי:', order.customerName, orderTime);
                            return true;
                        }
                    }
                }
                
                return false;
            });
        }
        
        // המרת תאריך הזמנה (dd/MM/yyyy או GMT string) ל-YYYY-MM-DD
        function orderDateToYMD(dateStr) {
            if (!dateStr) return null;
            const s = dateStr.toString().trim();
            if (s.includes('/')) {
                const parts = s.split('/');
                if (parts.length === 3) {
                    const [d, m, y] = parts;
                    return `${y.trim()}-${m.trim().padStart(2,'0')}-${d.trim().padStart(2,'0')}`;
                }
            }
            if (s.includes('GMT') || s.includes('00:00:00')) {
                const dt = new Date(s);
                if (!isNaN(dt.getTime())) {
                    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
                }
            }
            return null;
        }

        // פילטור לפי טווח תאריכים — השוואת מחרוזות YYYY-MM-DD כדי למנוע בעיות timezone
        function filterByDateRange(orders, fromDate, toDate) {
            let matchCount = 0;
            const filtered = orders.filter(order => {
                try {
                    const ymd = orderDateToYMD(order.date);
                    if (!ymd) return false;
                    const inRange = ymd >= fromDate && ymd <= toDate;
                    if (inRange) matchCount++;
                    return inRange;
                } catch (e) {
                    return false;
                }
            });
            console.log('נמצאו', matchCount, 'הזמנות בטווח', fromDate, '-', toDate);
            return filtered;
        }
        
        // עיבוד נתוני ההזמנות לפי תאריך - עם תמיכה בזיכויים
        function processOrdersDataByDate(orders) {
            const residentsDataByDate = {};
            
            orders.forEach(order => {
                const name = order.customerName || 'לא צוין';
                const residenceType = order.residenceType || '';
                const products = order.products || '';
                const total = parseInt(order.total) || 0;
                const orderType = order.orderType || 'רגילה'; // חדש!
                
                // קביעת התאריך הנכון (עם טיפול בהזמנות לילה)
                const correctDate = getCorrectEventDate(order.date, order.time);
                
                // מפתח ייחודי לכל תושב+תאריך+סוג
                const key = `${name}|${correctDate}|${orderType}`;
                
                if (!residentsDataByDate[key]) {
                    residentsDataByDate[key] = {
                        name: name,
                        residenceType: residenceType,
                        eventDate: correctDate,
                        eventDateFormatted: formatDateNice(correctDate),
                        orderType: orderType, // חדש!
                        orders: [],
                        totalAmount: 0
                    };
                }
                
                residentsDataByDate[key].orders.push({
                    products: products,
                    total: total
                });
                residentsDataByDate[key].totalAmount += total;
            });
            
            // המרה למערך וסדר לפי שם ואז לפי תאריך
            return Object.values(residentsDataByDate).sort((a, b) => {
                if (a.name !== b.name) {
                    return a.name.localeCompare(b.name, 'he');
                }
                if (a.eventDate !== b.eventDate) {
                    return a.eventDate.localeCompare(b.eventDate);
                }
                // מיון זיכויים אחרי הזמנות רגילות
                if (a.orderType !== b.orderType) {
                    return a.orderType === 'זיכוי' ? 1 : -1;
                }
                return 0;
            });
        }
        
        // אתחול הדף
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            warmupServer();

            // הגדרת תאריך היום כברירת מחדל
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            document.getElementById('eventDate').value = todayStr;
            document.getElementById('fromDate').value = todayStr;
            document.getElementById('toDate').value = todayStr;
            
            // Event listeners
            document.getElementById('singleEventBtn').addEventListener('click', () => setMode('single'));
            document.getElementById('dateRangeBtn').addEventListener('click', () => setMode('range'));
            document.getElementById('generateBtn').addEventListener('click', generateReport);
            document.getElementById('toggleDetailBtn').addEventListener('click', toggleDetails);
            document.getElementById('exportBtn').addEventListener('click', exportToExcel);
            document.getElementById('residenceFilter').addEventListener('change', filterTable);
        });
        
        // החלפת מצב (אירוע יחיד / טווח)
        function setMode(mode) {
            console.log('📊 מחליף למצב:', mode);
            
            const singleBtn = document.getElementById('singleEventBtn');
            const rangeBtn = document.getElementById('dateRangeBtn');
            const singleGroup = document.getElementById('singleDateGroup');
            const rangeGroup = document.getElementById('dateRangeGroup');
            
            if (mode === 'single') {
                singleBtn.classList.add('active');
                rangeBtn.classList.remove('active');
                singleGroup.classList.remove('hidden');
                rangeGroup.classList.add('hidden');
            } else {
                singleBtn.classList.remove('active');
                rangeBtn.classList.add('active');
                singleGroup.classList.add('hidden');
                rangeGroup.classList.remove('hidden');
            }
        }
        
        // יצירת דוח
        async function generateReport() {
            const isSingleMode = document.getElementById('singleEventBtn').classList.contains('active');
            const eventDate = document.getElementById('eventDate').value;
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            
            // בדיקות תקינות
            if (isSingleMode && !eventDate) {
                showToast('אנא בחר תאריך אירוע', 'error');
                return;
            }

            if (!isSingleMode && (!fromDate || !toDate)) {
                showToast('אנא בחר טווח תאריכים', 'error');
                return;
            }

            if (!isSingleMode && new Date(fromDate) > new Date(toDate)) {
                showToast('תאריך ההתחלה צריך להיות לפני תאריך הסיום', 'error');
                return;
            }
            
            const loadingIndicator = document.getElementById('loadingIndicator');
            const resultsSection = document.getElementById('resultsSection');
            const generateBtn = document.getElementById('generateBtn');
            
            // הצגת loading
            loadingIndicator.style.display = 'block';
            resultsSection.style.display = 'none';
            generateBtn.disabled = true;
            
            try {
                // שליפת נתונים מהשרת
                const orders = await fetchOrdersData(isSingleMode, eventDate, fromDate, toDate);
                
                // עיבוד הנתונים
                currentData = processOrdersDataByDate(orders);
                
                // הצגת התוצאות
                displayResults(currentData);
                
            } catch (error) {
                console.error('שגיאה ביצירת הדוח:', error);
                showError('שגיאה בטעינת הנתונים: ' + error.message);
            } finally {
                loadingIndicator.style.display = 'none';
                generateBtn.disabled = false;
            }
        }
        
        // הצגת התוצאות - מתוקן
        function displayResults(data) {
            updateStatistics(data);
            updateTable(data);
            
            document.getElementById('resultsSection').style.display = 'block';
        }
        
        // עדכון סטטיסטיקות - עם תמיכה בזיכויים
        function updateStatistics(filteredData) {
            const uniqueResidents = new Set(filteredData.map(item => item.name)).size;
            const totalOrders = filteredData.reduce((sum, item) => sum + item.orders.length, 0);
            
            // חישוב נפרד לחיובים וזיכויים
            const totalCharges = filteredData
                .filter(item => item.orderType !== 'זיכוי')
                .reduce((sum, item) => sum + item.totalAmount, 0);
            
            const totalCredits = Math.abs(filteredData
                .filter(item => item.orderType === 'זיכוי')
                .reduce((sum, item) => sum + item.totalAmount, 0));
            
            const netTotal = totalCharges - totalCredits;
            const averageSpending = uniqueResidents > 0 ? Math.round(netTotal / uniqueResidents) : 0;
            
            document.getElementById('totalResidents').textContent = uniqueResidents;
            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalRevenue').textContent = `₪${totalCharges}`;
            document.getElementById('totalCredits').textContent = `₪${totalCredits}`;
            document.getElementById('netTotal').textContent = `₪${netTotal}`;
            document.getElementById('averageSpending').textContent = `₪${averageSpending}`;
        }
        
        // עדכון טבלה - עם תמיכה בזיכויים
        function updateTable(data) {
            const tbody = document.getElementById('expensesTableBody');
            const residenceFilter = document.getElementById('residenceFilter').value;
            
            // סינון לפי סוג תושב - לוגיקה מתוקנת
            const filteredData = data.filter(item => {
                if (residenceFilter === 'all') return true;
                if (residenceFilter === 'nofi_list') return !item.residenceType; // ריק = נופי פרת ברשימה
                return item.residenceType === residenceFilter;
            });
            
            if (filteredData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="no-data">
                            אין נתונים להצגה עבור הפילטרים שנבחרו
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filteredData.map(item => {
                const ordersSummary = createOrdersSummary(item.orders);
                const residenceDisplay = item.residenceType ? 
                    `<div class="residence-type">(${item.residenceType})</div>` : '';
                
                // עיצוב סוג ההזמנה
                const orderTypeBadge = item.orderType === 'זיכוי' ? 
                    '<span class="order-type-badge credit">זיכוי</span>' :
                    '<span class="order-type-badge regular">רגילה</span>';
                
                // עיצוב הסכום לפי סוג
                let amountClass = 'total-amount';
                if (item.orderType === 'זיכוי') {
                    amountClass += ' negative';
                } else if (item.totalAmount > 0) {
                    amountClass += ' positive';
                }
                
                return `
                    <tr>
                        <td>
                            <div class="resident-name">${item.name}</div>
                            ${residenceDisplay}
                        </td>
                        <td>
                            <div class="event-date">${item.eventDateFormatted}</div>
                        </td>
                        <td>
                            <div class="order-details ${showDetails ? '' : 'hidden'}">
                                ${ordersSummary}
                            </div>
                        </td>
                        <td>${orderTypeBadge}</td>
                        <td class="${amountClass}">₪${item.totalAmount}</td>
                    </tr>
                `;
            }).join('');
        }
        
        // יצירת סיכום הזמנות
        function createOrdersSummary(orders) {
            const productCounts = {};
            
            orders.forEach(order => {
                const products = order.products.split(', ');
                products.forEach(product => {
                    const cleanProduct = product.trim();
                    if (cleanProduct && !cleanProduct.includes('₪') && !cleanProduct.startsWith('הנחה')) {
                        productCounts[cleanProduct] = (productCounts[cleanProduct] || 0) + 1;
                    }
                });
            });
            
            return Object.entries(productCounts)
                .map(([product, count]) => count > 1 ? `${product} x${count}` : product)
                .join(', ') || 'אין פריטים';
        }
        
        // הצגה/הסתרה של פירוט
        function toggleDetails() {
            showDetails = !showDetails;
            const button = document.getElementById('toggleDetailBtn');
            const details = document.querySelectorAll('.order-details');
            
            if (showDetails) {
                button.textContent = 'הסתר פירוט הזמנות';
                details.forEach(detail => detail.classList.remove('hidden'));
            } else {
                button.textContent = 'הצג פירוט הזמנות';
                details.forEach(detail => detail.classList.add('hidden'));
            }
        }
        
        // סינון טבלה לפי סוג תושב - מתוקן
        function filterTable() {
            if (currentData.length > 0) {
                const residenceFilter = document.getElementById('residenceFilter').value;
                
                // סינון הנתונים
                const filteredData = currentData.filter(item => {
                    if (residenceFilter === 'all') return true;
                    if (residenceFilter === 'nofi_list') return !item.residenceType; // ריק = נופי פרת ברשימה
                    return item.residenceType === residenceFilter;
                });
                
                // עדכון טבלה וסטטיסטיקות עם הנתונים המסוננים
                updateTable(currentData); // הטבלה מסננת בעצמה
                updateStatistics(filteredData); // הסטטיסטיקות לפי המסונן
            }
        }
        
        // יצוא לאקסל - עם תמיכה בזיכויים
        function exportToExcel() {
            if (currentData.length === 0) {
                showToast('אין נתונים ליצוא', 'warning');
                return;
            }
            
            const isSingleMode = document.getElementById('singleEventBtn').classList.contains('active');
            const eventDate = document.getElementById('eventDate').value;
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            const residenceFilter = document.getElementById('residenceFilter').value;
            
            // הכנת הנתונים ליצוא עם סדר חדש ותיקון סוג התושב
            const exportData = currentData
                .filter(item => {
                    if (residenceFilter === 'all') return true;
                    if (residenceFilter === 'nofi_list') return !item.residenceType; // ריק = נופי פרת ברשימה
                    return item.residenceType === residenceFilter;
                })
                .map(item => {
                    // תיקון סוג התושב - אם ריק זה אומר תושב נופי פרת מהרשימה
                    let residenceTypeDisplay = item.residenceType || 'תושב נופי פרת (ברשימה)';
                    
                    return {
                        'שם התושב': item.name,
                        'תאריך': item.eventDateFormatted,
                        'סוג הזמנה': item.orderType,
                        'סכום לחיוב': `₪${item.totalAmount}`,
                        'פירוט הזמנות': createOrdersSummary(item.orders),
                        'סוג תושב': residenceTypeDisplay
                    };
                });
            
            // יצירת קובץ Excel עם פורמט משופר ו-RTL
            const ws = XLSX.utils.json_to_sheet(exportData);
            
            // הגדרת כיוון RTL לגליון
            if (!ws['!worksheetOptions']) ws['!worksheetOptions'] = {};
            ws['!worksheetOptions']['rightToLeft'] = true;
            
            // הגדרת רוחבי עמודות לפורמט יפה יותר
            ws['!cols'] = [
                { width: 25 }, // שם התושב
                { width: 15 }, // תאריך
                { width: 12 }, // סוג הזמנה
                { width: 12 }, // סכום לחיוב
                { width: 40 }, // פירוט הזמנות
                { width: 30 }  // סוג תושב
            ];
            
            // יצירת workbook ושמירת הגיליון
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'סיכום הוצאות');
            
            // יצירת שם קובץ לפי המצב
            let fileName;
            if (isSingleMode) {
                fileName = `פרתיה_סיכום_הוצאות_אירוע_${eventDate}.xlsx`;
            } else {
                fileName = `פרתיה_סיכום_הוצאות_${fromDate}_עד_${toDate}.xlsx`;
            }
            
            XLSX.writeFile(wb, fileName);
        }
        
        // הצגת שגיאה
        function showError(message) {
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.innerHTML = `<div class="error-message">${message}</div>`;
            resultsSection.style.display = 'block';
        }
    </script>
</body>
</html>
