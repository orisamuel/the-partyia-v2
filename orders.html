<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<title>הפרתיה — בונים</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
<script src="utils.js"></script>
<style>
  /* Segmented slider for status */
  .status-seg {
    display: inline-flex;
    position: relative;
    background: var(--bg-elevated);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-pill);
    padding: 2px;
    gap: 0;
    user-select: none;
  }
  .seg-thumb {
    position: absolute;
    top: 2px; bottom: 2px;
    border-radius: var(--radius-pill);
    transition: left 0.22s var(--ease-spring), width 0.18s var(--ease-smooth);
    pointer-events: none;
    z-index: 0;
  }
  .seg-thumb.status-pending   { background: var(--danger-bg);  border: 1px solid rgba(239,68,68,0.35); }
  .seg-thumb.status-preparing { background: var(--warning-bg); border: 1px solid rgba(245,158,11,0.35); }
  .seg-thumb.status-ready     { background: var(--success-bg); border: 1px solid rgba(16,185,129,0.35); }
  .seg-btn {
    position: relative; z-index: 1;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    font-size: 0.76rem; font-weight: 600;
    cursor: pointer;
    background: transparent; border: none;
    color: var(--text-muted);
    transition: color 0.18s;
    white-space: nowrap;
  }
  .seg-btn.active-pending   { color: var(--danger);  }
  .seg-btn.active-preparing { color: var(--warning); }
  .seg-btn.active-ready     { color: var(--success); }
  .seg-btn:hover:not([class*="active-"]) { color: var(--text-secondary); }
  .orders-list-mobile { display: flex; flex-direction: column; gap: 10px; }
  .order-note {
    margin-top: 5px; padding: 4px 8px;
    background: rgba(245,158,11,0.08); border-right: 2px solid var(--warning);
    border-radius: 4px; font-size: 0.78rem; color: var(--warning);
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" class="loading-screen">
  <img src="logo.png" alt="הפרתיה" class="loading-logo">
  <div class="loading-title">הפרתיה</div>
  <div class="loading-spinner"></div>
  <div id="loadingProgress" class="loading-progress">טוען...</div>
</div>

<div id="mainContent">
<div class="container">

  <!-- Header -->
  <header class="header">
    <a href="admin.html"><img src="logo.png" alt="לוגו" class="header-logo"></a>
    <div class="header-title">
      <h1>👨‍🍳 הזמנות</h1>
      <p>הפרתיה — המשקאות שאנשים מחכים להם</p>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="החלף ערכת נושא">🌙</button>
      <a href="admin.html" class="header-link">⚙️ ניהול</a>
    </div>
  </header>

  <!-- System controls -->
  <div class="system-toggle-bar">
    <div style="display:flex;flex-direction:column;gap:2px;">
      <span class="system-status" id="systemStatusText">מערכת כבויה</span>
      <span class="text-xs text-muted" id="lastUpdateText"></span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="toggleBtn" onclick="toggleSystem()">▶ הפעל מערכת</button>
      <button class="btn btn-secondary btn-sm" onclick="manualRefresh()" title="רענן עכשיו">🔄</button>
      <button class="btn btn-secondary btn-sm" onclick="cleanupDone()" title="נקה הזמנות מוכנות">🧹</button>
    </div>
  </div>

  <!-- Live counters -->
  <div class="live-counter" id="liveCounter">
    <span class="text-muted text-sm">הפעל את המערכת לצפייה בהזמנות חיות</span>
  </div>

  <div class="page-body">

    <!-- Desktop table -->
    <table class="data-table desktop-only" id="ordersTable">
      <thead>
        <tr>
          <th style="width:72px">שעה</th>
          <th style="width:160px">לקוח</th>
          <th>פריטים</th>
          <th style="width:160px">הערה</th>
          <th style="width:220px">סטטוס</th>
        </tr>
      </thead>
      <tbody id="ordersTableBody">
        <tr><td colspan="5" style="padding:36px;text-align:center;color:var(--text-muted);">הפעל את המערכת כדי לראות הזמנות</td></tr>
      </tbody>
    </table>

    <!-- Mobile cards -->
    <div id="ordersMobile" class="orders-list-mobile mobile-only"></div>

  </div>
</div>
</div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let isRunning      = false;
let pollTimer      = null;
let autoStopTimer  = null;
let seenOrderIds   = new Set();
let ordersData     = [];
let pendingChanges = {};           // orderId → { status, ts }
const STATUS_LOCK  = 6000;         // ms to keep optimistic status

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  requireAuth();
  warmupServer();
  hideLoadingScreen(300);
});

// ─────────────────────────────────────────────
// System toggle
// ─────────────────────────────────────────────
function toggleSystem() {
  isRunning ? stopSystem() : startSystem();
}

function startSystem() {
  isRunning = true;
  seenOrderIds.clear();
  pendingChanges = {};

  setSystemUI(true);

  const hours = CONFIG.AUTO_STOP_HOURS || 5;
  autoStopTimer = setTimeout(() => {
    showToast('המערכת נכבתה אוטומטית לאחר ' + hours + ' שעות', 'warning', 6000);
    stopSystem();
  }, hours * 3600000);

  fetchOrders();
  const interval = CONFIG.POLL_INTERVAL_MS || 3000;
  pollTimer = setInterval(fetchOrders, interval);
  document.addEventListener('visibilitychange', onVisibilityChange);
}

function stopSystem() {
  isRunning = false;
  clearInterval(pollTimer);
  clearTimeout(autoStopTimer);
  pollTimer = null;
  setSystemUI(false);
  document.removeEventListener('visibilitychange', onVisibilityChange);
}

function setSystemUI(on) {
  const btn  = document.getElementById('toggleBtn');
  const stat = document.getElementById('systemStatusText');
  btn.textContent  = on ? '⏹ עצור מערכת' : '▶ הפעל מערכת';
  btn.className    = on ? 'btn btn-danger' : 'btn btn-primary';
  stat.textContent = on ? '● מערכת פעילה' : 'מערכת כבויה';
  stat.className   = on ? 'system-status active' : 'system-status';
}

function onVisibilityChange() {
  if (!isRunning) return;
  if (document.hidden) { clearInterval(pollTimer); pollTimer = null; }
  else if (!pollTimer) {
    fetchOrders();
    pollTimer = setInterval(fetchOrders, CONFIG.POLL_INTERVAL_MS || 3000);
  }
}

function manualRefresh() {
  if (!isRunning) { startSystem(); return; }
  fetchOrders();
}

// ─────────────────────────────────────────────
// Fetch
// ─────────────────────────────────────────────
function normalizeDateStr(s) {
  if (!s) return '';
  if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)) {
    const [d, m, y] = s.split('/');
    return `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;
  }
  if (s.includes('GMT') || s.includes('00:00:00')) {
    const dt = new Date(s);
    if (!isNaN(dt.getTime()))
      return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
  }
  return s;
}

function filterTodayOrders(items) {
  const now    = new Date();
  const hour   = now.getHours();
  const fmt    = d => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  const todayStr = fmt(now);
  // בין 00:00 ל-06:00 גם מציגים הזמנות מהאירוע של אתמול
  let prevStr = null;
  if (hour < 6) {
    const prev = new Date(now); prev.setDate(prev.getDate() - 1);
    prevStr = fmt(prev);
  }
  return items.filter(item => {
    const d = normalizeDateStr(item.date);
    return d === todayStr || (prevStr && d === prevStr);
  });
}

async function fetchOrders() {
  try {
    const res = await apiCall('getRecentOrders', { limit: 150 });
    if (!res.success) return;
    const rawItems = res.orders || [];
    console.log('[orders] raw sample (first 3):', rawItems.slice(0,3).map(i => ({name:i.customerName, products:i.products, note:i.note, date:i.date})));
    const items = filterTodayOrders(rawItems);
    checkForNewOrders(items);
    ordersData = items;
    renderAll(items);
    document.getElementById('lastUpdateText').textContent =
      'עדכון: ' + new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch (_) { /* silent — don't spam on network flap */ }
}

function checkForNewOrders(items) {
  const incoming = new Set(items.map(i => i.orderId));
  const isFirst  = seenOrderIds.size === 0;
  if (!isFirst) {
    const newOnes = [...incoming].filter(id => !seenOrderIds.has(id));
    if (newOnes.length) {
      playNewOrderSound();
      showToast('🍺 ' + newOnes.length + ' הזמנה חדשה הגיעה!', 'info', 3500);
      newOnes.forEach(id => flashRow(id));
    }
  }
  seenOrderIds = incoming;
}

function flashRow(orderId) {
  // will animate after next render
  setTimeout(() => {
    const el = document.getElementById('row-' + orderId) || document.getElementById('card-' + orderId);
    if (el) el.classList.add('new-order');
  }, 50);
}

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
function renderAll(items) {
  const now = Date.now();
  // Apply pending optimistic changes
  const display = items.map(item => {
    const p = pendingChanges[item.orderId];
    return (p && now - p.ts < STATUS_LOCK) ? { ...item, status: p.status } : item;
  }).filter(i => i.status !== 'cancelled');

  updateCounters(display);
  renderDesktop(display);
  renderMobile(display);
}

function updateCounters(items) {
  const cnt = { pending: 0, preparing: 0, ready: 0 };
  items.forEach(i => { if (cnt[i.status] !== undefined) cnt[i.status]++; });
  document.getElementById('liveCounter').innerHTML = `
    <span class="counter-chip pending">🔴 ממתין: ${cnt.pending}</span>
    <span class="counter-chip preparing">🟡 בהכנה: ${cnt.preparing}</span>
    <span class="counter-chip ready">🟢 מוכן: ${cnt.ready}</span>
    <span class="text-muted text-sm" style="margin-right:auto">סה"כ ${items.length} הזמנות</span>
  `;
}

function parseProductNote(str) {
  const m = String(str || '').match(/^(.*?)\s*\[(.+)\]\s*$/);
  return m ? { name: m[1].trim(), note: m[2].trim() } : { name: String(str || '').trim(), note: '' };
}

function renderDesktop(items) {
  const tbody = document.getElementById('ordersTableBody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="padding:40px;text-align:center;color:var(--text-muted);">אין הזמנות פעילות כרגע 🍺</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(item => {
    const parsed = parseProductNote(item.products);
    const notes = [parsed.note, item.note].filter(Boolean).join(' | ');
    return `<tr id="row-${item.orderId}">
      <td class="text-sm text-muted">${esc(fmtTimeStr(item.time))}</td>
      <td><strong style="color:var(--amber-bright)">${esc(item.customerName)}</strong></td>
      <td class="text-sm">${esc(parsed.name)}</td>
      <td class="text-sm">${notes ? `<span style="color:var(--warning)">📝 ${esc(notes)}</span>` : ''}</td>
      <td>${statusSlider(item.orderId, item.status)}</td>
    </tr>`;
  }).join('');
  requestAnimationFrame(() => items.forEach(i => positionThumb(i.orderId, i.status)));
}

function renderMobile(items) {
  const el = document.getElementById('ordersMobile');
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🍺</span><p class="empty-state-text">אין הזמנות פעילות</p></div>';
    return;
  }
  el.innerHTML = items.map(item => {
    const parsed = parseProductNote(item.products);
    const notes = [parsed.note, item.note].filter(Boolean).join(' | ');
    return `
    <div class="order-card status-${item.status}" id="card-${item.orderId}">
      <div class="order-card-name">${esc(item.customerName)}</div>
      <div class="order-card-items">${esc(parsed.name)}</div>
      ${notes ? `<div class="order-note">📝 ${esc(notes)}</div>` : ''}
      <div class="order-card-footer">
        <span class="order-card-time">${esc(fmtTimeStr(item.time))}</span>
        ${statusSlider(item.orderId, item.status)}
      </div>
    </div>
  `;
  }).join('');
  requestAnimationFrame(() => items.forEach(i => positionThumb(i.orderId, i.status)));
}

function statusSlider(orderId, current) {
  const opts = [
    { val: 'pending',   label: '⏳ ממתין' },
    { val: 'preparing', label: '🔥 בהכנה' },
    { val: 'ready',     label: '✅ מוכן' },
  ];
  const btns = opts.map(o => {
    const active = current === o.val ? ' active-' + o.val : '';
    return `<button class="seg-btn${active}" data-status="${o.val}" onclick="changeStatus('${orderId}','${o.val}')">${o.label}</button>`;
  }).join('');
  return `<div class="status-seg" id="sl-${orderId}"><div class="seg-thumb status-${current}" id="thumb-${orderId}"></div>${btns}</div>`;
}

function positionThumb(orderId, status) {
  const seg = document.getElementById('sl-' + orderId);
  if (!seg) return;
  const thumb = document.getElementById('thumb-' + orderId);
  const activeBtn = seg.querySelector('.seg-btn.active-' + status);
  if (!thumb || !activeBtn) return;
  thumb.style.left = activeBtn.offsetLeft + 'px';
  thumb.style.width = activeBtn.offsetWidth + 'px';
  thumb.className = 'seg-thumb status-' + status;
}

function fmtTimeStr(t) {
  if (!t) return '';
  if (/^\d{1,2}:\d{2}$/.test(String(t))) return String(t);
  const d = new Date(t);
  if (!isNaN(d.getTime())) return d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  const m = String(t).match(/(\d{1,2}:\d{2})/);
  return m ? m[1] : String(t);
}

// ─────────────────────────────────────────────
// Status update
// ─────────────────────────────────────────────
async function changeStatus(itemId, newStatus) {
  // Optimistic — show change immediately, guard for STATUS_LOCK ms
  pendingChanges[itemId] = { status: newStatus, ts: Date.now() };
  applyOptimistic(itemId, newStatus);

  try {
    const res = await apiCall('updateStatus', { orderId: itemId, newStatus });
    if (res.success) {
      // Commit to local data so the status survives pendingChanges expiry
      // (prevents the next poll from reverting if the sheet write is slow)
      const item = ordersData.find(i => i.orderId === itemId);
      if (item) item.status = newStatus;
    } else {
      showToast('שגיאה בעדכון סטטוס', 'error', 3000);
      delete pendingChanges[itemId];
    }
  } catch (_) {
    delete pendingChanges[itemId];
  }
}

function applyOptimistic(itemId, newStatus) {
  // Update slider buttons active class
  const seg = document.getElementById('sl-' + itemId);
  if (seg) {
    seg.querySelectorAll('.seg-btn').forEach(btn => {
      btn.className = 'seg-btn' + (btn.dataset.status === newStatus ? ' active-' + newStatus : '');
    });
    requestAnimationFrame(() => positionThumb(itemId, newStatus));
  }
  // Mobile card border color
  const card = document.getElementById('card-' + itemId);
  if (card) card.className = 'order-card status-' + newStatus;
  // Recount
  const now = Date.now();
  const current = ordersData.map(i => {
    const p = pendingChanges[i.orderId];
    return (p && now - p.ts < STATUS_LOCK) ? { ...i, status: p.status } : i;
  }).filter(i => i.status !== 'cancelled');
  updateCounters(current);
}

// ─────────────────────────────────────────────
// Cleanup ready orders
// ─────────────────────────────────────────────
function cleanupDone() {
  const readyItems = ordersData.filter(i => i.status === 'ready');
  if (!readyItems.length) { showToast('אין הזמנות מוכנות לניקוי', 'info'); return; }
  const now = Date.now();
  readyItems.forEach(i => { pendingChanges[i.orderId] = { status: 'cancelled', ts: now }; });
  const remaining = ordersData.filter(i => {
    const p = pendingChanges[i.orderId];
    const s = (p && now - p.ts < STATUS_LOCK) ? p.status : i.status;
    return s !== 'cancelled';
  });
  updateCounters(remaining);
  renderDesktop(remaining);
  renderMobile(remaining);
  showToast('נוקו ' + readyItems.length + ' הזמנות מוכנות 🧹', 'success');
}

// ─────────────────────────────────────────────
// Util
// ─────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
