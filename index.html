<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<title>הפרתיה — הזמנה</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
<script src="utils.js"></script>
<style>
  /* Page-specific layout */
  .index-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    align-items: start;
  }
  .index-main  { min-width: 0; }
  .credit-toggle-btn {
    padding: 8px 18px; border-radius: var(--radius-pill);
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    background: var(--glass-bg); border: 1.5px solid var(--glass-border);
    color: var(--text-secondary); transition: var(--t-fast);
  }
  .credit-toggle-btn.active {
    background: var(--danger-bg); color: var(--danger);
    border-color: rgba(239,68,68,0.4);
  }
  .custom-row { display: flex; gap: 8px; align-items: center; }
  .custom-row .form-input { flex: 1; }
  .custom-row input[type="number"] { width: 80px; flex: none; }
  .custom-label {
    font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.03em; margin-bottom: 3px;
  }
  /* Compact customer info bar */
  .customer-bar {
    display: flex; gap: 10px; align-items: flex-start;
    flex-wrap: wrap; margin-bottom: 12px;
  }
  .customer-bar .segment-control { flex-shrink: 0; }
  .customer-bar .autocomplete-wrapper { flex: 1; min-width: 180px; }

  .edit-order-products { display: flex; flex-direction: column; gap: 6px; }
  .edit-product-row { display: flex; gap: 8px; align-items: center; }
  .edit-product-row input { flex: 1; }

  /* Category side-label layout */
  .cat-section { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 8px; }
  .cat-tag {
    writing-mode: vertical-rl; direction: rtl;
    font-size: 0.62rem; font-weight: 700; color: var(--amber-dim);
    letter-spacing: 0.04em; padding: 4px 2px; flex-shrink: 0;
    border-right: 2px solid var(--glass-border); padding-right: 4px;
  }
  .cat-cards {
    flex: 1; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }
  .cat-cards-full {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }
  @media (max-width: 768px) {
    .cat-cards, .cat-cards-full { grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 7px; }
  }
  @media (max-width: 480px) {
    .cat-cards, .cat-cards-full { grid-template-columns: repeat(3, 1fr); }
  }

  /* Per-product note input */
  .product-note-input {
    display: none; width: 100%; margin-top: 5px;
    padding: 3px 7px; font-size: 0.7rem;
    border-radius: 6px; border: 1px solid var(--glass-border);
    background: var(--bg-base); color: var(--text-primary);
    outline: none;
  }
  .product-note-input:focus { border-color: var(--amber-dim); }
  .product-card.selected .product-note-input { display: block; }

  @media (max-width: 900px) {
    .index-layout { grid-template-columns: 1fr; }
    .order-sidebar { position: static; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" class="loading-screen">
  <img src="logo.png" alt="הפרתיה" class="loading-logo">
  <div class="loading-title">הפרתיה</div>
  <div class="loading-spinner"></div>
  <div id="loadingProgress" class="loading-progress">מתחבר לשרת...</div>
</div>

<div id="mainContent">
<div class="container">

  <!-- Header -->
  <header class="header">
    <a href="admin.html"><img src="logo.png" alt="לוגו" class="header-logo"></a>
    <div class="header-title">
      <h1 id="appTitle">הפרתיה</h1>
      <p id="appSubtitle">פאב קהילתי נופי פרת</p>
    </div>
    <div class="header-actions">
      <button id="creditToggleBtn" class="credit-toggle-btn" onclick="toggleCreditMode()">💳 מצב זיכוי</button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="החלף ערכת נושא">🌙</button>
      <a href="admin.html" class="header-link">⚙️ ניהול</a>
    </div>
  </header>

  <div class="page-body">
  <div class="index-layout">

    <!-- ── LEFT: Order form ────────────────────────── -->
    <div class="index-main">

      <!-- Customer info — compact bar -->
      <div class="card mb-12" style="padding:12px 16px;">
        <div class="customer-bar">
          <div class="segment-control" id="residenceControl">
            <button class="segment-btn active" onclick="setResidenceType('נופי פרת', this)">🏡 נופי פרת</button>
            <button class="segment-btn" onclick="setResidenceType('נופי פרת לא ברשימה', this)">🏡 לא ברשימה</button>
            <button class="segment-btn" onclick="setResidenceType('כפר אדומים', this)">🌳 כפר אדומים</button>
            <button class="segment-btn" onclick="setResidenceType('אלון', this)">🍃 אלון</button>
          </div>
          <div class="autocomplete-wrapper" style="flex:1;min-width:180px;">
            <input type="text" id="customerNameInput" class="form-input"
              placeholder="התחל להקליד שם..." autocomplete="off"
              oninput="onNameInput(this.value)" onblur="onNameBlur()">
            <div id="autocompleteList" class="autocomplete-list" style="display:none;"></div>
          </div>
        </div>
        <div id="nameValidation" class="text-xs mt-4" style="min-height:1.1em;padding-right:2px;"></div>
      </div>

      <!-- Products -->
      <div class="card mb-16" style="padding:12px 16px;">
        <div id="productsGrid">
          <div class="flex-center" style="padding:24px;color:var(--text-muted);">
            <div class="spinner-sm" style="margin-left:8px;"></div> טוען מוצרים...
          </div>
        </div>
      </div>

    </div>

    <!-- ── RIGHT: Sidebar ──────────────────────────── -->
    <aside>
      <div class="order-sidebar" id="orderSidebar">

        <!-- Custom amount + discount -->
        <div class="mb-8">
          <div class="custom-label">➕ תוספת (מוצר שאינו ברשימה)</div>
          <div class="custom-row mb-8">
            <input type="text" id="customDescription" class="form-input" placeholder="לדוג׳: מוצר שאינו ברשימה">
            <input type="number" id="customAmount" class="form-input" placeholder="₪" min="0"
              oninput="updateTotal()">
          </div>
          <div id="discountRow">
            <div class="custom-label">➖ הנחה</div>
            <div class="custom-row">
              <input type="text" id="discountDescription" class="form-input" placeholder="לדוג׳ הנחה עבור שת״פ">
              <input type="number" id="discountAmount" class="form-input" placeholder="₪" min="0"
                oninput="updateTotal()">
            </div>
          </div>
        </div>

        <!-- Total -->
        <div class="order-total-box">
          <div class="order-total-label" id="totalLabel">סכום כולל</div>
          <div class="order-total-amount" id="totalDisplay">₪0</div>
        </div>

        <!-- Note -->
        <div class="mb-8">
          <div class="custom-label">📝 הערה להזמנה</div>
          <input type="text" id="orderNote" class="form-input" placeholder="הערה אופציונלית...">
        </div>

        <!-- Submit -->
        <button class="btn btn-primary btn-large mb-12" id="submitBtn" onclick="submitOrder()" disabled>
          📝 שלח הזמנה
        </button>

        <button class="btn btn-secondary btn-large mb-16" onclick="resetForm()">🔄 נקה הכל</button>

        <hr class="divider">

        <!-- Recent orders -->
        <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
          <span>📋 הזמנות אחרונות</span>
          <button class="btn btn-secondary btn-sm" onclick="loadRecentOrders()" title="רענן">🔄</button>
        </div>
        <div id="recentOrdersList">
          <div class="text-muted text-sm" style="padding:8px 0;">טוען...</div>
        </div>
      </div>
    </aside>

  </div>
  </div>

</div>
</div>

<!-- Edit Order Modal -->
<div id="editOrderModal" class="modal-backdrop" onclick="closeEditModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ עריכת הזמנה</span>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div id="editOrderContent"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="cancelOrder()">🗑️ בטל הזמנה</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">ביטול</button>
      <button class="btn btn-primary" onclick="saveEditOrder()">💾 שמור שינויים</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let PRODUCTS     = [];
let RESIDENTS    = [];
let selectedItems = {};         // productName → quantity
let productNotes  = {};         // productName → note string
let isCreditMode  = false;
let isNameValid   = false;
let residenceType = 'נופי פרת';
let editingOrderId = null;
let recentPollTimer = null;

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  initTheme();
  warmupServer();
  document.getElementById('appTitle').textContent    = CONFIG.APP_NAME    || 'הפרתיה';
  document.getElementById('appSubtitle').textContent = CONFIG.APP_SUBTITLE || '';
  await loadData();
  loadRecentOrders();
  recentPollTimer = setInterval(loadRecentOrders, 15000);
});

async function loadData() {
  updateLoadingProgress('טוען מוצרים...');
  try {
    const [pRes, rRes] = await Promise.all([
      apiCall('getProducts'),
      apiCall('getResidents'),
    ]);
    if (pRes.success) { PRODUCTS = pRes.products || []; renderProducts(); }
    else showToast('שגיאה בטעינת מוצרים', 'error');
    if (rRes.success) RESIDENTS = rRes.residents || [];
    updateLoadingProgress('מוכן!');
    hideLoadingScreen(400);
  } catch (e) {
    showToast('שגיאת חיבור — בודק חיבור לשרת', 'error', 6000);
    hideLoadingScreen(400);
  }
}

// ─────────────────────────────────────────────
// Products
// ─────────────────────────────────────────────
const CATEGORY_ORDER = ['קוקטיילים', 'אלכוהול', 'משקאות', 'אוכל', 'כללי'];
let PRODUCT_NAMES = []; // idx → product name (avoids apostrophe issues in onclick)

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (!PRODUCTS.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:20px;">אין מוצרים</div>';
    return;
  }

  // Group by category
  const categories = {};
  PRODUCTS.forEach(p => {
    const cat = p.category || 'כללי';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(p);
  });

  // Sort categories (cocktails first)
  const sortedEntries = Object.entries(categories).sort(([a], [b]) => {
    const ai = CATEGORY_ORDER.indexOf(a);
    const bi = CATEGORY_ORDER.indexOf(b);
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });

  PRODUCT_NAMES = [];
  let pIdx = 0;
  const multiCat = sortedEntries.length > 1;
  let html = '';
  for (const [cat, products] of sortedEntries) {
    const cardsHtml = products.map(p => {
      const idx = pIdx++;
      PRODUCT_NAMES[idx] = p.name;
      return `
        <div class="product-card" id="pc-${idx}" onclick="toggleProduct(${idx})">
          <span class="product-emoji">${p.emoji || '🍽️'}</span>
          <div class="product-name">${esc(p.name)}</div>
          <div class="product-price">₪${p.price}</div>
          <div class="product-qty">
            <button class="qty-btn" onclick="event.stopPropagation();changeQty(${idx},-1)">−</button>
            <span class="qty-num" id="qty-${idx}">1</span>
            <button class="qty-btn" onclick="event.stopPropagation();changeQty(${idx},1)">+</button>
          </div>
          <input class="product-note-input" id="pnote-${idx}" placeholder="📝 הערה למוצר..."
            onclick="event.stopPropagation()"
            oninput="setProductNote(${idx}, this.value)">
        </div>`;
    }).join('');

    if (multiCat) {
      html += `<div class="cat-section">
        <div class="cat-tag">${cat}</div>
        <div class="cat-cards">${cardsHtml}</div>
      </div>`;
    } else {
      html += `<div class="cat-cards cat-cards-full">${cardsHtml}</div>`;
    }
  }
  grid.innerHTML = html;
}

function toggleProduct(idx) {
  const name = PRODUCT_NAMES[idx];
  if (selectedItems[name]) {
    delete selectedItems[name];
    delete productNotes[name];
    document.getElementById('pc-' + idx)?.classList.remove('selected');
    const qEl = document.getElementById('qty-' + idx);
    if (qEl) qEl.textContent = '1';
    const noteEl = document.getElementById('pnote-' + idx);
    if (noteEl) noteEl.value = '';
  } else {
    selectedItems[name] = 1;
    document.getElementById('pc-' + idx)?.classList.add('selected');
  }
  updateTotal();
}

function setProductNote(idx, val) {
  const name = PRODUCT_NAMES[idx];
  if (val.trim()) productNotes[name] = val.trim();
  else delete productNotes[name];
}

function changeQty(idx, delta) {
  const name = PRODUCT_NAMES[idx];
  if (!selectedItems[name]) return;
  const newQty = (selectedItems[name] || 1) + delta;
  if (newQty <= 0) {
    delete selectedItems[name];
    document.getElementById('pc-' + idx)?.classList.remove('selected');
  } else {
    selectedItems[name] = newQty;
    const qEl = document.getElementById('qty-' + idx);
    if (qEl) qEl.textContent = newQty;
  }
  updateTotal();
}

// ─────────────────────────────────────────────
// Residence type
// ─────────────────────────────────────────────
function setResidenceType(type, btn) {
  residenceType = type;
  document.querySelectorAll('#residenceControl .segment-btn')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const nameInput = document.getElementById('customerNameInput');
  if (type === 'נופי פרת') {
    nameInput.placeholder = 'התחל להקליד שם...';
    validateName(nameInput.value);
  } else {
    nameInput.placeholder = 'שם...';
    showNameStatus('', '');
    isNameValid = !!nameInput.value.trim();
    document.getElementById('submitBtn').disabled = !isNameValid;
  }
}

// ─────────────────────────────────────────────
// Name autocomplete
// ─────────────────────────────────────────────
function onNameInput(val) {
  if (residenceType !== 'נופי פרת') {
    isNameValid = !!val.trim();
    document.getElementById('submitBtn').disabled = !isNameValid;
    return;
  }
  const list = document.getElementById('autocompleteList');
  if (!val.trim()) { list.style.display = 'none'; validateName(''); return; }
  const tokens = val.trim().split(/\s+/).filter(Boolean);
  const matches = RESIDENTS.filter(r => {
    const name = r.fullName;
    const nick = r.nickname || '';
    return tokens.every(t => name.includes(t) || nick.includes(t));
  }).slice(0, 8);
  if (!matches.length) { list.style.display = 'none'; validateName(val); return; }
  list.style.display = 'block';
  list.innerHTML = matches.map(r =>
    `<div class="autocomplete-item" onmousedown="selectResident('${esc(r.fullName)}')">${r.fullName}${r.nickname ? ' (' + r.nickname + ')' : ''}</div>`
  ).join('');
  validateName(val);
}

function onNameBlur() {
  setTimeout(() => {
    document.getElementById('autocompleteList').style.display = 'none';
  }, 200);
}

function selectResident(fullName) {
  document.getElementById('customerNameInput').value = fullName;
  document.getElementById('autocompleteList').style.display = 'none';
  validateName(fullName);
}

function validateName(val) {
  if (residenceType !== 'נופי פרת') return;
  const match = RESIDENTS.find(r => r.fullName === val);
  if (match) {
    isNameValid = true;
    showNameStatus('✓ ' + match.fullName, 'var(--success)');
  } else {
    isNameValid = false;
    showNameStatus(val ? '✗ שם לא נמצא ברשימה' : '', 'var(--danger)');
  }
  document.getElementById('submitBtn').disabled = !isNameValid;
}

function showNameStatus(msg, color) {
  const el = document.getElementById('nameValidation');
  el.textContent = msg;
  el.style.color = color;
}

// ─────────────────────────────────────────────
// Credit mode
// ─────────────────────────────────────────────
function toggleCreditMode() {
  isCreditMode = !isCreditMode;
  const btn = document.getElementById('creditToggleBtn');
  const sidebar = document.getElementById('orderSidebar');
  const body = document.getElementById('mainContent');
  btn.classList.toggle('active', isCreditMode);
  btn.textContent = isCreditMode ? '✓ מצב זיכוי פעיל' : '💳 מצב זיכוי';
  body.classList.toggle('credit-mode', isCreditMode);
  document.getElementById('totalLabel').textContent = isCreditMode ? 'סכום זיכוי' : 'סכום כולל';
  document.getElementById('submitBtn').textContent  = isCreditMode ? '💳 אישור זיכוי' : '📝 שלח הזמנה';
  document.getElementById('discountRow').style.display = isCreditMode ? 'none' : 'block';
  updateTotal();
}

// ─────────────────────────────────────────────
// Total
// ─────────────────────────────────────────────
function updateTotal() {
  let total = 0;
  Object.entries(selectedItems).forEach(([name, qty]) => {
    const p = PRODUCTS.find(pr => pr.name === name);
    if (p) total += p.price * qty;
  });
  const custom   = parseFloat(document.getElementById('customAmount').value) || 0;
  const discount = parseFloat(document.getElementById('discountAmount').value) || 0;
  total += custom;
  if (!isCreditMode) total -= discount;
  if (isCreditMode) total = -Math.abs(total);

  const el = document.getElementById('totalDisplay');
  el.textContent = '₪' + Math.abs(total);
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}

function getTotal() {
  let total = 0;
  Object.entries(selectedItems).forEach(([name, qty]) => {
    const p = PRODUCTS.find(pr => pr.name === name);
    if (p) total += p.price * qty;
  });
  const custom   = parseFloat(document.getElementById('customAmount').value) || 0;
  const discount = parseFloat(document.getElementById('discountAmount').value) || 0;
  total += custom;
  if (!isCreditMode) total -= discount;
  if (isCreditMode) total = -Math.abs(total);
  return total;
}

function buildProductsString() {
  const parts = [];
  Object.entries(selectedItems).forEach(([name, qty]) => {
    const note  = productNotes[name];
    const label = note ? `${name} [${note}]` : name;
    parts.push(qty > 1 ? `${label} (${qty})` : label);
  });
  const custDesc = document.getElementById('customDescription').value.trim();
  const custAmt  = parseFloat(document.getElementById('customAmount').value) || 0;
  if (custAmt) parts.push((custDesc || 'סכום חופשי') + ' ✱' + custAmt + '₪');
  const discDesc = document.getElementById('discountDescription').value.trim();
  const discAmt  = parseFloat(document.getElementById('discountAmount').value) || 0;
  if (discAmt && !isCreditMode) parts.push('הנחה: ' + (discDesc || '') + ' -₪' + discAmt);
  if (isCreditMode) return parts.map(p => 'זיכוי: ' + p).join(', ');
  return parts.join(', ');
}

// ─────────────────────────────────────────────
// Submit
// ─────────────────────────────────────────────
async function submitOrder() {
  if (!isNameValid) { showToast('יש לבחור שם לקוח', 'error'); return; }
  const total = getTotal();
  if (total === 0 && Object.keys(selectedItems).length === 0) {
    showToast('יש לבחור לפחות מוצר אחד', 'error'); return;
  }
  const customerName = document.getElementById('customerNameInput').value.trim();
  const products     = buildProductsString();
  const note         = document.getElementById('orderNote').value.trim();

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span> שולח...';

  try {
    const res = await apiCall('addOrder', {
      customerName, products,
      total: total,
      residenceType,
      isCredit: isCreditMode,
      note,
    });
    if (res.success) {
      showToast('✓ הזמנה נשלחה בהצלחה!', 'success', 4000);
      resetForm();
      loadRecentOrders();
    } else {
      showToast('שגיאה בשליחת הזמנה: ' + (res.message || ''), 'error');
    }
  } catch (e) {
    showToast('שגיאת חיבור', 'error');
  }

  btn.disabled = false;
  btn.innerHTML = isCreditMode ? '💳 אישור זיכוי' : '📝 שלח הזמנה';
}

// ─────────────────────────────────────────────
// Reset
// ─────────────────────────────────────────────
function resetForm() {
  selectedItems = {};
  productNotes  = {};
  document.querySelectorAll('.product-card.selected').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.qty-num').forEach(el => el.textContent = '1');
  document.querySelectorAll('.product-note-input').forEach(el => el.value = '');
  document.getElementById('customerNameInput').value = '';
  document.getElementById('customAmount').value = '';
  document.getElementById('customDescription').value = '';
  document.getElementById('discountAmount').value = '';
  document.getElementById('discountDescription').value = '';
  document.getElementById('orderNote').value = '';
  document.getElementById('nameValidation').textContent = '';
  isNameValid = false;
  document.getElementById('submitBtn').disabled = true;
  updateTotal();
  if (isCreditMode) toggleCreditMode();
}

// ─────────────────────────────────────────────
// Recent orders
// ─────────────────────────────────────────────
let recentOrdersData = [];

async function loadRecentOrders() {
  try {
    const res = await apiCall('getRecentOrdersFromMain', { limit: CONFIG.RECENT_ORDERS_DISPLAY || 10 });
    if (!res.success) return;
    recentOrdersData = (res.orders || []).reverse(); // newest first
    renderRecentOrders();
  } catch (_) {}
}

function renderRecentOrders() {
  const el = document.getElementById('recentOrdersList');
  if (!recentOrdersData.length) {
    el.innerHTML = '<div class="text-muted text-sm" style="padding:8px 0;">אין הזמנות עדיין</div>';
    return;
  }
  el.innerHTML = recentOrdersData.map(order => {
    const isCancelled = order.status === 'cancelled';
    return `
      <div class="recent-order-item" style="${isCancelled ? 'opacity:0.5;' : ''}">
        <div class="recent-order-name">${esc(order.customerName)}</div>
        <div class="recent-order-items">${esc(order.products)}</div>
        ${order.note ? `<div class="text-xs" style="color:var(--warning);margin-top:2px;">📝 ${esc(order.note)}</div>` : ''}
        <div class="recent-order-meta">
          <span>${fmtTimeStr(order.time)}</span>
          <span class="recent-order-total">${isCancelled ? '❌ בוטל' : '₪' + Math.abs(order.total || 0)}</span>
        </div>
        ${!isCancelled ? `
        <div class="recent-order-actions">
          <button class="btn btn-secondary btn-sm" onclick="openEditOrder('${esc(order.orderId)}')">✏️ ערוך</button>
          <button class="btn btn-danger btn-sm" onclick="confirmCancelOrder('${esc(order.orderId)}')">✕ בטל</button>
        </div>` : ''}
      </div>
    `;
  }).join('');
}

// ─────────────────────────────────────────────
// Edit order
// ─────────────────────────────────────────────
function openEditOrder(orderId) {
  editingOrderId = orderId;
  const order = recentOrdersData.find(o => o.orderId === orderId);
  if (!order) return;
  document.getElementById('editOrderContent').innerHTML = `
    <div class="form-group">
      <label class="form-label">לקוח</label>
      <div class="form-input" style="background:var(--bg-base);cursor:default;">${esc(order.customerName)}</div>
    </div>
    <div class="form-group">
      <label class="form-label">מוצרים (ערוך ידנית)</label>
      <textarea id="editProducts" class="form-input" rows="3" style="resize:vertical;">${esc(order.products)}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">סכום כולל (₪)</label>
      <input type="number" id="editTotal" class="form-input" value="${Math.abs(order.total || 0)}">
    </div>
    <div class="form-group">
      <label class="form-label">📝 הערה</label>
      <input type="text" id="editNote" class="form-input" value="${esc(order.note || '')}" placeholder="הערה אופציונלית...">
    </div>
  `;
  document.getElementById('editOrderModal').classList.add('open');
}

function closeEditModal(event) {
  if (event && event.target !== document.getElementById('editOrderModal')) return;
  document.getElementById('editOrderModal').classList.remove('open');
  editingOrderId = null;
}

async function saveEditOrder() {
  if (!editingOrderId) return;
  const products = document.getElementById('editProducts').value.trim();
  const total    = parseInt(document.getElementById('editTotal').value) || 0;
  const note     = document.getElementById('editNote')?.value.trim() || '';
  if (!products) { showToast('יש להזין מוצרים', 'error'); return; }
  try {
    const res = await apiCall('updateOrder', { orderId: editingOrderId, products, total, note });
    if (res.success) {
      showToast('✓ הזמנה עודכנה', 'success');
      document.getElementById('editOrderModal').classList.remove('open');
      editingOrderId = null;
      loadRecentOrders();
    } else { showToast('שגיאה: ' + (res.message || ''), 'error'); }
  } catch (e) { showToast('שגיאת חיבור', 'error'); }
}

async function confirmCancelOrder(orderId) {
  if (!confirm('לבטל את ההזמנה הזו?')) return;
  await doCancelOrder(orderId);
}

async function cancelOrder() {
  if (!editingOrderId) return;
  if (!confirm('לבטל את ההזמנה?')) return;
  await doCancelOrder(editingOrderId);
  document.getElementById('editOrderModal').classList.remove('open');
  editingOrderId = null;
}

async function doCancelOrder(orderId) {
  try {
    const res = await apiCall('cancelOrder', { orderId });
    if (res.success) { showToast('הזמנה בוטלה', 'warning'); loadRecentOrders(); }
    else showToast('שגיאה: ' + (res.message || ''), 'error');
  } catch (_) { showToast('שגיאת חיבור', 'error'); }
}

// ─────────────────────────────────────────────
// Util
// ─────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTimeStr(t) {
  if (!t) return '';
  // Already HH:mm
  if (/^\d{1,2}:\d{2}$/.test(String(t))) return String(t);
  // Try parsing as Date
  const d = new Date(t);
  if (!isNaN(d.getTime())) return d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  // Regex extract HH:mm from a longer string
  const m = String(t).match(/(\d{1,2}:\d{2})/);
  return m ? m[1] : String(t);
}
