<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<title>הפרתיה — מלאי</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
<script src="utils.js"></script>
<style>
  /* Inventory table layout */
  .inv-list { display: flex; flex-direction: column; gap: 0; }
  .inv-header-row {
    display: grid;
    grid-template-columns: 1fr 70px 70px 70px 110px;
    gap: 8px; align-items: center;
    padding: 8px 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md) var(--radius-md) 0 0;
    font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
    text-align: center;
  }
  .inv-header-row .inv-col-name { text-align: right; }
  .inv-row {
    display: grid;
    grid-template-columns: 1fr 70px 70px 70px 110px;
    gap: 8px; align-items: center;
    padding: 9px 14px;
    border: 1px solid var(--glass-border);
    border-top: none;
    background: var(--bg-card);
    transition: background 0.15s;
  }
  .inv-row:last-child { border-radius: 0 0 var(--radius-md) var(--radius-md); }
  .inv-row:hover { background: var(--glass-hover); }
  .inv-col-name { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem; }
  .inv-col-name .inv-emoji { font-size: 1.1rem; }
  .inv-col-num { text-align: center; font-weight: 700; font-size: 1rem; }
  .inv-stock-ok   { color: var(--success); }
  .inv-stock-low  { color: var(--warning); }
  .inv-stock-zero { color: var(--danger);  }
  .inv-tobuy-pos  { color: var(--warning); font-weight: 800; }
  .inv-tobuy-zero { color: var(--text-muted); font-weight: 500; }
  .inv-controls   { display: flex; gap: 4px; align-items: center; justify-content: flex-end; }
  .inv-adj-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg); color: var(--text-primary);
    font-size: 1rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--t-fast);
  }
  .inv-adj-btn:hover { border-color: var(--amber); color: var(--amber); }
  .inv-edit-btn {
    padding: 3px 8px; font-size: 0.72rem; font-weight: 600;
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
    background: var(--glass-bg); color: var(--text-secondary);
    cursor: pointer; transition: var(--t-fast); white-space: nowrap;
  }
  .inv-edit-btn:hover { border-color: var(--amber-glow); color: var(--amber); }
  /* Beer group */
  .inv-group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--glass-border); border-top: none;
    background: var(--bg-elevated);
    cursor: pointer; transition: background 0.15s; flex-wrap: wrap;
  }
  .inv-group-header:hover { background: var(--glass-hover); }
  .inv-group-title { font-weight: 700; font-size: 0.95rem; }
  .inv-group-badge {
    font-size: 0.78rem; background: var(--glass-bg);
    border: 1px solid var(--glass-border); color: var(--text-secondary);
    padding: 2px 10px; border-radius: 999px;
  }
  .inv-group-body { border: 1px solid var(--glass-border); border-top: none; }
  .inv-group-body .inv-row { border-top: 1px solid var(--glass-border); border-radius: 0; }
  .inv-group-body .inv-row:first-child { border-top: none; }
  .inv-group-footer {
    padding: 8px 12px;
    border-top: 1px solid var(--glass-border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  /* Responsive */
  @media (max-width: 600px) {
    .inv-header-row, .inv-row {
      grid-template-columns: 1fr 46px 92px;
      padding: 8px 10px; gap: 5px;
    }
    .inv-col-req, .inv-col-buy { display: none !important; }
    .inv-adj-btn { width: 24px; height: 24px; font-size: 0.9rem; }
    .inv-edit-btn { padding: 3px 6px; font-size: 0.65rem; }
    .inv-group-header { padding: 9px 10px; gap: 7px; }
    .inv-group-footer { padding: 7px 10px; }
  }
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <img src="logo.png" alt="הפרתיה" class="loading-logo">
  <div class="loading-title">מלאי</div>
  <div class="loading-spinner"></div>
  <div id="loadingProgress" class="loading-progress">טוען מלאי...</div>
</div>

<div id="mainContent">
<div class="container">

  <header class="header">
    <a href="admin.html"><img src="logo.png" alt="לוגו" class="header-logo"></a>
    <div class="header-title">
      <h1>📦 ניהול מלאי</h1>
      <p>הפרתיה — עדכון כמויות</p>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
      <a href="admin.html" class="btn-back">← חזרה</a>
    </div>
  </header>

  <div class="page-body">

    <!-- Low stock alert -->
    <div id="lowStockAlert" style="display:none;"></div>

    <div class="flex-between mb-16" style="flex-wrap:wrap;gap:10px;">
      <div class="section-title" style="margin:0;border:none;">רשימת מוצרים במלאי</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="loadInventory()">🔄 רענן</button>
        <button class="btn btn-primary btn-sm" onclick="openAddProductModal()">+ הוסף מוצר למלאי</button>
      </div>
    </div>

    <div id="inventoryGrid">
      <div class="flex-center" style="padding:40px;color:var(--text-muted);">
        <div class="spinner-sm" style="margin-left:8px;"></div> טוען מלאי...
      </div>
    </div>

  </div>
</div>
</div>

<!-- Update stock modal -->
<div id="addStockModal" class="modal-backdrop" onclick="closeModal(event,'addStockModal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="addStockTitle">עדכון מלאי</span>
      <button class="modal-close" onclick="closeModal(null,'addStockModal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">כמות לעדכון</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-secondary" onclick="setDeltaSign(-1)" id="btnMinus">− הפחת</button>
        <input type="number" id="stockDelta" class="form-input" value="1" min="1" style="text-align:center;width:80px;">
        <button class="btn btn-primary" onclick="setDeltaSign(1)" id="btnPlus">+ הוסף</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">מלאי נדרש</label>
      <input type="number" id="stockRequired" class="form-input" placeholder="כמה צריך לערב?" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">סיבה (אופציונלי)</label>
      <input type="text" id="stockReason" class="form-input" placeholder="לדוגמה: קנייה, ספירה, שבירה...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal(null,'addStockModal')">ביטול</button>
      <button class="btn btn-primary" onclick="submitStockUpdate()">✓ עדכן מלאי</button>
    </div>
  </div>
</div>

<!-- Add product to inventory modal -->
<div id="addProductModal" class="modal-backdrop" onclick="closeModal(event,'addProductModal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">+ הוסף מוצר למלאי</span>
      <button class="modal-close" onclick="closeModal(null,'addProductModal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">שם מוצר</label>
      <input type="text" id="newInvProduct" class="form-input" placeholder="שם המוצר">
    </div>
    <div class="form-group">
      <label class="form-label">כמות קיימת</label>
      <input type="number" id="newInvQty" class="form-input" value="0" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">מלאי נדרש — כמה צריך לערב?</label>
      <input type="number" id="newInvRequired" class="form-input" value="0" min="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal(null,'addProductModal')">ביטול</button>
      <button class="btn btn-primary" onclick="submitNewProduct()">+ הוסף</button>
    </div>
  </div>
</div>

<script>
let inventoryData  = [];
let editingProduct = null;
let deltaSign      = 1;

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  warmupServer();
  loadInventory();
});

async function loadInventory() {
  try {
    const res = await apiCall('getInventory');
    if (!res.success) { showToast('שגיאה בטעינת מלאי', 'error'); hideLoadingScreen(300); return; }
    inventoryData = res.inventory || [];
    renderInventory();
    renderLowStockAlert();
    hideLoadingScreen(300);
  } catch (e) {
    showToast('שגיאת חיבור', 'error');
    hideLoadingScreen(300);
  }
}

function makeInvRow(item, label) {
  const req      = item.requiredStock || 0;
  const toBuy    = req > 0 ? Math.max(0, req - item.stock) : 0;
  const isZero   = item.stock === 0;
  const isLow    = !isZero && req > 0 && item.stock < req;
  const numCls   = isZero ? 'inv-stock-zero' : isLow ? 'inv-stock-low' : 'inv-stock-ok';
  const buyCls   = toBuy > 0 ? 'inv-tobuy-pos' : 'inv-tobuy-zero';
  const safeName = esc(item.name);           // used for API calls
  const display  = esc(label || item.name);  // what's shown
  return `
    <div class="inv-row animate-fadein">
      <div class="inv-col-name">
        <span class="inv-emoji">${item.emoji || '📦'}</span>
        <span>${display}</span>
        ${item.notes ? `<span class="text-xs text-muted" style="font-style:italic;" title="${esc(item.notes)}">💡</span>` : ''}
      </div>
      <div class="inv-col-num inv-col-cur ${numCls}">${item.stock}</div>
      <div class="inv-col-num inv-col-req" style="color:var(--text-secondary);">${req > 0 ? req : '—'}</div>
      <div class="inv-col-num inv-col-buy ${buyCls}">${toBuy > 0 ? toBuy : (req > 0 ? '✓' : '—')}</div>
      <div class="inv-controls">
        <button class="inv-adj-btn" data-name="${safeName}" onclick="quickAdj(this.dataset.name,-1)">−</button>
        <button class="inv-adj-btn" data-name="${safeName}" onclick="quickAdj(this.dataset.name,1)">+</button>
        <button class="inv-edit-btn" data-name="${safeName}" onclick="openStockModal(this.dataset.name)">✏️</button>
      </div>
    </div>`;
}

function renderInventory() {
  const grid = document.getElementById('inventoryGrid');
  if (!inventoryData.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">📦</span>
        <p class="empty-state-text">המלאי ריק — הוסף מוצרים כדי להתחיל</p>
      </div>`;
    return;
  }

  // Beer split: "בירות" = authoritative total, "בירה X" = named sub-types
  const beerMain  = inventoryData.find(i => i.name === 'בירות');
  const beerSubs  = inventoryData.filter(i => i.name.startsWith('בירה '));
  const others    = inventoryData.filter(i => i.name !== 'בירות' && !i.name.startsWith('בירה '));

  const subsTotal  = beerSubs.reduce((s, i) => s + i.stock, 0);
  const uncat      = beerMain ? beerMain.stock : 0;  // uncategorized beers (in "בירות" row)
  const mainStock  = subsTotal + uncat;               // total = all named + uncategorized
  const required   = beerMain ? (beerMain.requiredStock || 0) : 0;
  const toBuyBeer  = required > 0 ? Math.max(0, required - mainStock) : 0;

  const headerHtml = `
    <div class="inv-header-row">
      <div class="inv-col-name">פריט</div>
      <div class="inv-col-cur">קיים</div>
      <div class="inv-col-req">נדרש</div>
      <div class="inv-col-buy">לקנות</div>
      <div></div>
    </div>`;

  let html = '<div class="inv-list">' + headerHtml;

  // Beer group FIRST
  const hasBeerData = beerMain || beerSubs.length > 0;
  if (hasBeerData) {
    // Group header includes +/- controls for the total ("בירות" row)
    const beerName = 'בירות';
    html += `
      <div class="inv-group-header">
        <span style="font-size:1.1rem;" onclick="toggleBeerGroup(this.parentElement)">🍺</span>
        <span class="inv-group-title" onclick="toggleBeerGroup(this.parentElement)" style="cursor:pointer;">בירות</span>
        <span class="inv-group-badge">${mainStock} יח׳</span>
        ${required > 0 ? `<span class="inv-group-badge" style="color:var(--text-muted);">נדרש: ${required}</span>` : ''}
        ${toBuyBeer > 0 ? `<span class="badge badge-danger">${toBuyBeer} לקנות</span>` : (required > 0 ? `<span class="badge badge-success">✓ מספיק</span>` : '')}
        <div style="margin-right:auto;display:flex;align-items:center;gap:4px;">
          <button class="inv-adj-btn" data-name="${beerName}" onclick="quickAdj(this.dataset.name,-1)">−</button>
          <button class="inv-adj-btn" data-name="${beerName}" onclick="quickAdj(this.dataset.name,1)">+</button>
          <button class="inv-edit-btn" data-name="${beerName}" onclick="openStockModal(this.dataset.name)">✏️</button>
          <span class="inv-group-chevron" onclick="toggleBeerGroup(this.parentElement.parentElement)" style="color:var(--text-muted);font-size:0.8rem;cursor:pointer;transition:transform 0.2s;display:inline-block;padding:4px;">▼</span>
        </div>
      </div>
      <div class="inv-group-body" id="beerGroup">`;

    // Named sub-types
    html += beerSubs.map(i => makeInvRow(i)).join('');

    // "לא ידוע" row — shows uncategorized beers (beerMain.stock)
    if (uncat > 0) {
      html += `
        <div class="inv-row" style="opacity:0.7;">
          <div class="inv-col-name" style="color:var(--text-muted);font-style:italic;">
            <span class="inv-emoji">❓</span><span>לא ידוע</span>
          </div>
          <div class="inv-col-num inv-col-cur inv-stock-ok">${uncat}</div>
          <div class="inv-col-num inv-col-req">—</div>
          <div class="inv-col-num inv-col-buy">—</div>
          <div class="inv-controls"></div>
        </div>`;
    }

    html += `
        <div class="inv-group-footer">
          <button class="btn btn-secondary btn-sm" onclick="openAddBeerTypeModal()">+ סוג בירה חדש</button>
        </div>
      </div>`;
  }

  html += others.map(i => makeInvRow(i)).join('');
  html += '</div>';
  grid.innerHTML = html;
}

function toggleBeerGroup(header) {
  const group   = document.getElementById('beerGroup');
  const chevron = header.querySelector('.inv-group-chevron');
  if (!group) return;
  const isOpen = group.style.display !== 'none';
  group.style.display = isOpen ? 'none' : 'block';
  if (chevron) chevron.style.transform = isOpen ? 'rotate(-90deg)' : '';
}

function renderLowStockAlert() {
  const lowItems = inventoryData.filter(i => {
    const req = i.requiredStock || 0;
    return req > 0 && i.stock < req;
  });
  const alertEl = document.getElementById('lowStockAlert');
  if (!lowItems.length) { alertEl.style.display = 'none'; return; }
  alertEl.style.display = 'block';
  alertEl.innerHTML = `
    <div class="alert-strip alert-warning mb-16">
      ⚠️ <strong>${lowItems.length} מוצרים</strong> במלאי נמוך:
      ${lowItems.map(i => `<span class="badge badge-danger" style="margin-right:4px;">${esc(i.name)} (${i.stock}/${i.requiredStock})</span>`).join('')}
    </div>`;
}

async function quickAdj(productName, delta) {
  const item = inventoryData.find(i => i.name === productName);
  if (!item) return;
  item.stock = Math.max(0, item.stock + delta);
  renderInventory();
  renderLowStockAlert();
  try {
    await apiCall('updateStock', { productName, delta, reason: 'עדכון מהיר' });
  } catch (_) { showToast('שגיאה בשמירה', 'error'); }
}

function openStockModal(productName) {
  const item = inventoryData.find(i => i.name === productName);
  editingProduct = productName;
  deltaSign = 1;
  document.getElementById('addStockTitle').textContent = 'עדכון מלאי — ' + productName;
  document.getElementById('stockDelta').value    = '';
  document.getElementById('stockReason').value  = '';
  document.getElementById('stockRequired').value = item ? (item.requiredStock || '') : '';
  document.getElementById('btnPlus').className  = 'btn btn-primary';
  document.getElementById('btnMinus').className = 'btn btn-secondary';
  document.getElementById('addStockModal').classList.add('open');
}

function setDeltaSign(sign) {
  deltaSign = sign;
  document.getElementById('btnPlus').className  = sign > 0 ? 'btn btn-primary' : 'btn btn-secondary';
  document.getElementById('btnMinus').className = sign < 0 ? 'btn btn-danger'  : 'btn btn-secondary';
}

async function submitStockUpdate() {
  const rawDelta = parseInt(document.getElementById('stockDelta').value);
  const rawReq   = document.getElementById('stockRequired').value;
  const reason   = document.getElementById('stockReason').value.trim();
  const hasDelta = rawDelta && rawDelta > 0;
  const hasReq   = rawReq !== '';
  if (!hasDelta && !hasReq) {
    showToast('לא הוזנו שינויים', 'warning');
    return;
  }
  closeModal(null, 'addStockModal');
  try {
    if (hasDelta) {
      const delta = deltaSign * rawDelta;
      const res = await apiCall('updateStock', { productName: editingProduct, delta, reason });
      if (res.success) showToast(`✓ מלאי עודכן — ${editingProduct}: ${res.newStock}`, 'success');
      else showToast('שגיאה בעדכון מלאי: ' + (res.message || ''), 'error');
    }
    if (hasReq) {
      const res = await apiCall('updateRequiredStock', { productName: editingProduct, requiredStock: parseInt(rawReq) || 0 });
      if (res && res.success === false) showToast('שגיאה בעדכון מלאי נדרש: ' + (res.message || ''), 'error');
      else if (!hasDelta) showToast(`✓ מלאי נדרש עודכן — ${editingProduct}`, 'success');
    }
    loadInventory();
  } catch (_) { showToast('שגיאת חיבור', 'error'); }
}

function openAddProductModal() {
  document.getElementById('newInvProduct').value  = '';
  document.getElementById('newInvQty').value      = '0';
  document.getElementById('newInvRequired').value = '0';
  document.getElementById('addProductModal').classList.add('open');
}

function openAddBeerTypeModal() {
  document.getElementById('newInvProduct').value  = 'בירה ';
  document.getElementById('newInvQty').value      = '0';
  document.getElementById('newInvRequired').value = '0';
  document.getElementById('addProductModal').classList.add('open');
  setTimeout(() => {
    const el = document.getElementById('newInvProduct');
    el.focus(); el.setSelectionRange(el.value.length, el.value.length);
  }, 100);
}

async function submitNewProduct() {
  const name     = document.getElementById('newInvProduct').value.trim();
  const qty      = parseInt(document.getElementById('newInvQty').value) || 0;
  const required = parseInt(document.getElementById('newInvRequired').value) || 0;
  if (!name) { showToast('יש להזין שם מוצר', 'error'); return; }
  closeModal(null, 'addProductModal');
  try {
    const res = await apiCall('updateStock', { productName: name, delta: qty, reason: 'יצירה ראשונית' });
    if (res.success) {
      if (required > 0) await apiCall('updateRequiredStock', { productName: name, requiredStock: required });
      showToast('✓ מוצר נוסף למלאי', 'success');
      loadInventory();
    } else showToast('שגיאה: ' + (res.message || ''), 'error');
  } catch (_) { showToast('שגיאת חיבור', 'error'); }
}

function closeModal(event, id) {
  if (event && event.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
