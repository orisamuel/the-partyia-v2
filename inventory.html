<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<title>הפרתיה — מלאי</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
<script src="utils.js"></script>
<style>
  /* ── Inventory table ── */
  .inv-list { display: flex; flex-direction: column; gap: 0; }
  .inv-header-row {
    display: grid;
    grid-template-columns: 1fr 70px 70px 70px 110px;
    gap: 8px; align-items: center;
    padding: 8px 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md) var(--radius-md) 0 0;
    font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
    text-align: center;
  }
  .inv-header-row .inv-col-name { text-align: right; }
  .inv-row {
    display: grid;
    grid-template-columns: 1fr 70px 70px 70px 110px;
    gap: 8px; align-items: center;
    padding: 9px 14px;
    border: 1px solid var(--glass-border);
    border-top: none;
    background: var(--bg-card);
    transition: background 0.15s;
  }
  .inv-row:hover { background: var(--glass-hover); }
  .inv-row-notes {
    grid-column: 1 / -1;
    font-size: 0.78rem;
    color: var(--text-secondary);
    font-style: italic;
    padding: 0 14px 6px;
    border: 1px solid var(--glass-border);
    border-top: none;
    background: var(--bg-card);
  }
  .inv-col-name { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem; flex-wrap: wrap; }
  .inv-col-name .inv-emoji { font-size: 1.1rem; }
  .inv-col-num { text-align: center; font-weight: 700; font-size: 1rem; }
  .inv-stock-ok   { color: var(--success); }
  .inv-stock-low  { color: var(--warning); }
  .inv-stock-zero { color: var(--danger);  }
  .inv-tobuy-pos  { color: var(--warning); font-weight: 800; }
  .inv-tobuy-zero { color: var(--text-muted); font-weight: 500; }
  .inv-controls   { display: flex; gap: 4px; align-items: center; justify-content: flex-end; }
  .inv-adj-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg); color: var(--text-primary);
    font-size: 1rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--t-fast);
  }
  .inv-adj-btn:hover { border-color: var(--amber); color: var(--amber); }
  .inv-edit-btn {
    padding: 3px 8px; font-size: 0.72rem; font-weight: 600;
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
    background: var(--glass-bg); color: var(--text-secondary);
    cursor: pointer; transition: var(--t-fast); white-space: nowrap;
  }
  .inv-edit-btn:hover { border-color: var(--amber-glow); color: var(--amber); }

  /* ── Category sections ── */
  .inv-category {
    margin-bottom: 12px;
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--glass-border);
  }
  .inv-category-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--bg-surface);
    cursor: pointer; user-select: none;
    transition: background 0.15s;
    border-bottom: 1px solid var(--glass-border);
  }
  .inv-category-header:hover { background: var(--glass-hover); }
  .inv-category-title { font-weight: 700; font-size: 1rem; flex: 1; }
  .inv-category-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .inv-category-chevron {
    font-size: 0.8rem; color: var(--text-muted);
    transition: transform 0.2s; display: inline-block;
  }
  .inv-category-body { background: var(--bg-card); }
  .inv-category-body .inv-header-row { border-radius: 0; border: none; border-bottom: 1px solid var(--glass-border); }
  .inv-category-body .inv-row { border-left: none; border-right: none; }
  .inv-category-body .inv-row:first-of-type { border-top: none; }
  .inv-category-body .inv-row-notes { border-left: none; border-right: none; }

  /* ── Beer group ── */
  .inv-group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--glass-border);
    background: var(--bg-elevated);
    cursor: pointer; transition: background 0.15s; flex-wrap: wrap;
  }
  .inv-group-header:hover { background: var(--glass-hover); }
  .inv-group-title { font-weight: 700; font-size: 0.95rem; }
  .inv-group-badge {
    font-size: 0.78rem; background: var(--glass-bg);
    border: 1px solid var(--glass-border); color: var(--text-secondary);
    padding: 2px 10px; border-radius: 999px;
  }
  .inv-group-body { }
  .inv-group-body .inv-row { border-top: 1px solid var(--glass-border); border-radius: 0; }
  .inv-group-body .inv-row:first-child { border-top: none; }
  .inv-group-body .inv-row-notes { border-top: none; }
  .inv-group-footer {
    padding: 8px 12px;
    border-top: 1px solid var(--glass-border);
    display: flex; gap: 8px; justify-content: flex-end;
    background: var(--bg-card);
  }
  .inv-group-chevron {
    font-size: 0.8rem; color: var(--text-muted);
    transition: transform 0.2s; display: inline-block;
  }

  /* ── Low stock alert (mobile-safe) ── */
  #lowStockAlert {
    margin-bottom: 16px;
  }
  #lowStockAlert .alert-strip {
    display: flex;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    max-width: 100%;
    box-sizing: border-box;
  }
  #lowStockAlert .alert-strip .badge {
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* ── Mobile: expandable rows ── */
  .inv-row-expand {
    display: none;
    grid-column: 1 / -1;
    padding: 8px 14px 10px;
    border: 1px solid var(--glass-border);
    border-top: none;
    background: var(--bg-elevated);
    font-size: 0.82rem;
    color: var(--text-secondary);
    gap: 8px;
    flex-direction: column;
  }
  .inv-row-expand-row {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .inv-row-expand span { font-weight: 700; color: var(--text-primary); }

  @media (max-width: 600px) {
    .inv-header-row, .inv-row {
      grid-template-columns: 1fr 46px 92px;
      padding: 8px 10px; gap: 5px;
    }
    .inv-col-req, .inv-col-buy { display: none !important; }
    .inv-adj-btn { width: 28px; height: 28px; font-size: 0.9rem; }
    .inv-edit-btn { padding: 4px 8px; font-size: 0.7rem; }
    .inv-group-header { padding: 9px 10px; gap: 7px; }
    .inv-group-footer { padding: 7px 10px; }
    .inv-category-header { padding: 10px 12px; }
    /* Tap to expand on mobile */
    .inv-row { cursor: pointer; }
    .inv-row.row-expanded + .inv-row-expand { display: flex !important; }
    .inv-row-expand { display: none; }
    /* Prevent expand from triggering when tapping controls */
    .inv-controls { pointer-events: all; }
  }
  @media (min-width: 601px) {
    .inv-row-expand { display: none !important; }
    .mobile-hint { display: none; }
  }
  .mobile-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    padding: 4px 0 8px;
  }
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <img src="logo.png" alt="הפרתיה" class="loading-logo">
  <div class="loading-title">מלאי</div>
  <div class="loading-spinner"></div>
  <div id="loadingProgress" class="loading-progress">טוען מלאי...</div>
</div>

<div id="mainContent">
<div class="container">

  <header class="header">
    <a href="admin.html"><img src="logo.png" alt="לוגו" class="header-logo"></a>
    <div class="header-title">
      <h1>📦 ניהול מלאי</h1>
      <p>הפרתיה — עדכון כמויות</p>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
      <a href="admin.html" class="btn-back">← חזרה</a>
    </div>
  </header>

  <div class="page-body">

    <!-- Low stock alert — sticky, scrolls independently -->
    <div id="lowStockAlert" style="display:none;"></div>

    <div class="flex-between mb-16" style="flex-wrap:wrap;gap:10px;">
      <div class="section-title" style="margin:0;border:none;">רשימת מוצרים במלאי</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="loadInventory()">🔄 רענן</button>
        <button class="btn btn-primary btn-sm" id="btnAddProduct" onclick="openAddProductModal()">+ הוסף מוצר</button>
      </div>
    </div>

    <p class="mobile-hint">💡 לחץ על מוצר לפרטים נוספים</p>

    <div id="inventoryGrid">
      <div class="flex-center" style="padding:40px;color:var(--text-muted);">
        <div class="spinner-sm" style="margin-left:8px;"></div> טוען מלאי...
      </div>
    </div>

  </div>
</div>
</div>

<!-- ── Update stock modal ── -->
<div id="addStockModal" class="modal-backdrop" onclick="closeModal(event,'addStockModal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="addStockTitle">עדכון מלאי</span>
      <button class="modal-close" onclick="closeModal(null,'addStockModal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">כמות לעדכון</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-secondary" onclick="setDeltaSign(-1)" id="btnMinus">− הפחת</button>
        <input type="number" id="stockDelta" class="form-input" value="1" min="1" style="text-align:center;width:80px;">
        <button class="btn btn-primary" onclick="setDeltaSign(1)" id="btnPlus">+ הוסף</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">מלאי נדרש</label>
      <input type="number" id="stockRequired" class="form-input" placeholder="כמה צריך לערב?" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">הערה על המוצר (נשמרת קבוע)</label>
      <input type="text" id="stockNotes" class="form-input" placeholder="טיפ, מידע, מאיפה לקנות...">
    </div>
    <div class="form-group">
      <label class="form-label">קטגוריה</label>
      <select id="stockCategory" class="form-input">
        <option value="">— ללא שינוי —</option>
        <option value="אלכוהול">🍺 אלכוהול</option>
        <option value="פירות ותוספות לקוקטיילים">🍋 פירות ותוספות לקוקטיילים</option>
        <option value="נשנושים">🍟 נשנושים</option>
        <option value="אחר">📦 אחר</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">סיבה לשינוי מלאי (אופציונלי)</label>
      <input type="text" id="stockReason" class="form-input" placeholder="לדוגמה: קנייה, ספירה, שבירה...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal(null,'addStockModal')">ביטול</button>
      <button class="btn btn-primary" onclick="submitStockUpdate()">✓ עדכן</button>
    </div>
  </div>
</div>

<!-- ── Add product modal ── -->
<div id="addProductModal" class="modal-backdrop" onclick="closeModal(event,'addProductModal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="addProductTitle">+ הוסף מוצר למלאי</span>
      <button class="modal-close" onclick="closeModal(null,'addProductModal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">שם מוצר</label>
      <input type="text" id="newInvProduct" class="form-input" placeholder="שם המוצר">
    </div>
    <div class="form-group">
      <label class="form-label">כמות קיימת</label>
      <input type="number" id="newInvQty" class="form-input" value="0" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">מלאי נדרש — כמה צריך לערב?</label>
      <input type="number" id="newInvRequired" class="form-input" value="0" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">קטגוריה</label>
      <select id="newInvCategory" class="form-input">
        <option value="אחר">📦 אחר</option>
        <option value="אלכוהול">🍺 אלכוהול</option>
        <option value="פירות ותוספות לקוקטיילים">🍋 פירות ותוספות לקוקטיילים</option>
        <option value="נשנושים">🍟 נשנושים</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">הערה (אופציונלי)</label>
      <input type="text" id="newInvNotes" class="form-input" placeholder="טיפ, מידע, מאיפה לקנות...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal(null,'addProductModal')">ביטול</button>
      <button class="btn btn-primary" onclick="submitNewProduct()">+ הוסף</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = ['אלכוהול', 'פירות ותוספות לקוקטיילים', 'נשנושים', 'אחר'];
const CAT_EMOJI  = { 'אלכוהול': '🍺', 'פירות ותוספות לקוקטיילים': '🍋', 'נשנושים': '🍟', 'אחר': '📦' };

let inventoryData  = [];
let editingProduct = null;
let deltaSign      = 1;
let openCategories = new Set(); // קטגוריות פתוחות
let beerGroupOpen  = false;     // האם קבוצת הבירות פתוחה

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  requireAuth();
  warmupServer();
  loadInventory();
});

async function loadInventory() {
  try {
    const res = await apiCall('getInventory');
    if (!res.success) { showToast('שגיאה בטעינת מלאי', 'error'); hideLoadingScreen(300); return; }
    inventoryData = res.inventory || [];
    renderInventory();
    renderLowStockAlert();
    hideLoadingScreen(300);
  } catch (e) {
    showToast('שגיאת חיבור', 'error');
    hideLoadingScreen(300);
  }
}

/* ── Row HTML ── */
function makeInvRow(item, safeName) {
  safeName = safeName || esc(item.name);
  const req    = item.requiredStock || 0;
  const toBuy  = req > 0 ? Math.max(0, req - item.stock) : 0;
  const isZero = item.stock === 0;
  const isLow  = !isZero && req > 0 && item.stock < req;
  const numCls = isZero ? 'inv-stock-zero' : isLow ? 'inv-stock-low' : 'inv-stock-ok';
  const buyCls = toBuy > 0 ? 'inv-tobuy-pos' : 'inv-tobuy-zero';
  const display = esc(item.name);

  // Row body (clickable area excludes controls on mobile)
  const rowHtml = `
    <div class="inv-row animate-fadein" id="row-${safeName}" data-safe="${safeName}" onclick="handleRowClick(event,this.dataset.safe)">
      <div class="inv-col-name">
        <span class="inv-emoji">${item.emoji || '📦'}</span>
        <span>${display}</span>
      </div>
      <div class="inv-col-num inv-col-cur ${numCls}">${item.stock}</div>
      <div class="inv-col-num inv-col-req" style="color:var(--text-secondary);">${req > 0 ? req : '—'}</div>
      <div class="inv-col-num inv-col-buy ${buyCls}">${toBuy > 0 ? toBuy : (req > 0 ? '✓' : '—')}</div>
      <div class="inv-controls">
        <button class="inv-adj-btn" data-name="${safeName}" onclick="event.stopPropagation();quickAdj(this.dataset.name,-1)">−</button>
        <button class="inv-adj-btn" data-name="${safeName}" onclick="event.stopPropagation();quickAdj(this.dataset.name,1)">+</button>
        <button class="inv-edit-btn" data-name="${safeName}" onclick="event.stopPropagation();openStockModal(this.dataset.name)">✏️</button>
      </div>
    </div>`;

  // Expand panel (visible on mobile when tapped)
  const expandHtml = `
    <div class="inv-row-expand" id="expand-${safeName}">
      <div class="inv-row-expand-row">
        <div>קיים: <span>${item.stock}</span></div>
        <div>נדרש: <span>${req > 0 ? req : '—'}</span></div>
        <div>לקנות: <span class="${buyCls}">${toBuy > 0 ? toBuy : (req > 0 ? '✓' : '—')}</span></div>
      </div>
      ${item.notes ? `<div>💡 ${esc(item.notes)}</div>` : ''}
    </div>`;

  return rowHtml + expandHtml;
}

function handleRowClick(event, safeName) {
  // Only expand on mobile
  if (window.innerWidth > 600) return;
  // Don't expand if clicking controls
  if (event.target.closest('.inv-controls')) return;

  const row    = document.getElementById('row-' + safeName);
  const expand = document.getElementById('expand-' + safeName);
  if (!row || !expand) return;

  const isOpen = row.classList.contains('row-expanded');
  // Close all others
  document.querySelectorAll('.inv-row.row-expanded').forEach(r => r.classList.remove('row-expanded'));
  document.querySelectorAll('.inv-row-expand').forEach(e => e.style.display = 'none');

  if (!isOpen) {
    row.classList.add('row-expanded');
    expand.style.display = 'flex';
  }
}

/* ── Render ── */
function renderInventory() {
  const grid = document.getElementById('inventoryGrid');
  if (!inventoryData.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">📦</span>
        <p class="empty-state-text">המלאי ריק — הוסף מוצרים כדי להתחיל</p>
      </div>`;
    return;
  }

  // Beer separation
  const beerMain = inventoryData.find(i => i.name === 'בירות');
  const beerSubs = inventoryData.filter(i => i.name.startsWith('בירה '));
  const nonBeer  = inventoryData.filter(i => i.name !== 'בירות' && !i.name.startsWith('בירה '));

  // Group non-beer by category
  const groups = {};
  CATEGORIES.forEach(c => groups[c] = []);
  nonBeer.forEach(item => {
    const cat = item.category || 'אחר';
    if (groups[cat]) groups[cat].push(item);
    else groups['אחר'].push(item);
  });

  const headerHtml = `
    <div class="inv-header-row">
      <div class="inv-col-name">פריט</div>
      <div class="inv-col-cur">קיים</div>
      <div class="inv-col-req">נדרש</div>
      <div class="inv-col-buy">לקנות</div>
      <div></div>
    </div>`;

  let html = '';

  CATEGORIES.forEach(cat => {
    const catItems = groups[cat] || [];
    const hasBeerGroup = cat === 'אלכוהול' && (beerMain || beerSubs.length > 0);
    if (!catItems.length && !hasBeerGroup) return;

    // Count low-stock in category
    const allCatItems = [...catItems];
    if (hasBeerGroup) {
      const subsTotal = beerSubs.reduce((s, i) => s + i.stock, 0);
      const uncat = beerMain ? beerMain.stock : 0;
      const totalBeer = subsTotal + uncat;
      const req = beerMain ? (beerMain.requiredStock || 0) : 0;
      if (req > 0 && totalBeer < req) allCatItems.push({ name: 'בירות', stock: totalBeer, requiredStock: req });
    }
    const lowCount = allCatItems.filter(i => i.requiredStock > 0 && i.stock < i.requiredStock).length;

    const catId = 'cat-' + cat.replace(/\s+/g, '-');
    html += `
      <div class="inv-category">
        <div class="inv-category-header" onclick="toggleCategory('${catId}')">
          <span style="font-size:1.2rem;">${CAT_EMOJI[cat] || '📦'}</span>
          <span class="inv-category-title">${cat}</span>
          <div class="inv-category-meta">
            <span class="inv-group-badge">${allCatItems.length} פריטים</span>
            ${lowCount > 0 ? `<span class="badge badge-danger">${lowCount} במלאי נמוך</span>` : ''}
          </div>
          <span class="inv-category-chevron" id="chev-${catId}">▼</span>
        </div>
        <div class="inv-category-body" id="${catId}" style="display:none;">
          ${headerHtml}`;

    // Beer group within 'אלכוהול'
    if (hasBeerGroup) {
      html += renderBeerGroup(beerMain, beerSubs);
    }

    // Other items in this category
    catItems.forEach(item => { html += makeInvRow(item); });

    html += `</div></div>`;
  });

  grid.innerHTML = html;
  restoreOpenState();
}

function renderBeerGroup(beerMain, beerSubs) {
  const subsTotal = beerSubs.reduce((s, i) => s + i.stock, 0);
  const uncat     = beerMain ? beerMain.stock : 0;
  const mainStock = subsTotal + uncat;
  const required  = beerMain ? (beerMain.requiredStock || 0) : 0;
  const toBuyBeer = required > 0 ? Math.max(0, required - mainStock) : 0;
  const beerName  = 'בירות';

  let html = `
    <div class="inv-group-header" onclick="toggleBeerGroup(this)">
      <span style="font-size:1.1rem;">🍺</span>
      <span class="inv-group-title">בירות (${beerSubs.length} סוגים)</span>
      <span class="inv-group-badge">${mainStock} יח׳</span>
      ${required > 0 ? `<span class="inv-group-badge" style="color:var(--text-muted);">נדרש: ${required}</span>` : ''}
      ${toBuyBeer > 0 ? `<span class="badge badge-danger">${toBuyBeer} לקנות</span>` : (required > 0 ? `<span class="badge badge-success">✓ מספיק</span>` : '')}
      <div style="margin-right:auto;display:flex;align-items:center;gap:4px;">
        <button class="inv-adj-btn" data-name="${beerName}" onclick="event.stopPropagation();quickAdj(this.dataset.name,-1)">−</button>
        <button class="inv-adj-btn" data-name="${beerName}" onclick="event.stopPropagation();quickAdj(this.dataset.name,1)">+</button>
        <button class="inv-edit-btn" data-name="${beerName}" onclick="event.stopPropagation();openStockModal(this.dataset.name)">✏️</button>
      </div>
      <span class="inv-group-chevron" id="beer-chevron" style="padding:4px;">▼</span>
    </div>
    <div class="inv-group-body" id="beerGroup" style="display:none;">`;

  beerSubs.forEach(i => { html += makeInvRow(i); });

  if (uncat > 0) {
    html += `
      <div class="inv-row" style="opacity:0.7;">
        <div class="inv-col-name" style="color:var(--text-muted);font-style:italic;">
          <span class="inv-emoji">❓</span><span>לא ידוע</span>
        </div>
        <div class="inv-col-num inv-col-cur inv-stock-ok">${uncat}</div>
        <div class="inv-col-num inv-col-req">—</div>
        <div class="inv-col-num inv-col-buy">—</div>
        <div class="inv-controls"></div>
      </div>`;
  }

  html += `
      <div class="inv-group-footer">
        <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openAddBeerTypeModal()">+ סוג בירה חדש</button>
      </div>
    </div>`;

  return html;
}

function toggleCategory(catId) {
  const body    = document.getElementById(catId);
  const chevron = document.getElementById('chev-' + catId);
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (chevron) chevron.style.transform = isOpen ? 'rotate(-90deg)' : '';
  // זכור מצב
  if (isOpen) openCategories.delete(catId);
  else        openCategories.add(catId);
}

function toggleBeerGroup(header) {
  const group   = document.getElementById('beerGroup');
  const chevron = document.getElementById('beer-chevron');
  if (!group) return;
  const isOpen = group.style.display !== 'none';
  group.style.display = isOpen ? 'none' : 'block';
  if (chevron) chevron.style.transform = isOpen ? 'rotate(-90deg)' : '';
  beerGroupOpen = !isOpen;
}

function restoreOpenState() {
  openCategories.forEach(catId => {
    const body    = document.getElementById(catId);
    const chevron = document.getElementById('chev-' + catId);
    if (body) body.style.display = 'block';
    if (chevron) chevron.style.transform = '';
  });
  if (beerGroupOpen) {
    const group   = document.getElementById('beerGroup');
    const chevron = document.getElementById('beer-chevron');
    if (group)   group.style.display = 'block';
    if (chevron) chevron.style.transform = '';
  }
}

/* ── Low stock alert ── */
function renderLowStockAlert() {
  // Compute beer total correctly
  const beerMain = inventoryData.find(i => i.name === 'בירות');
  const beerSubs = inventoryData.filter(i => i.name.startsWith('בירה '));
  const subsTotal = beerSubs.reduce((s, i) => s + i.stock, 0);
  const beerTotal = (beerMain ? beerMain.stock : 0) + subsTotal;

  const lowItems = inventoryData.filter(i => {
    if (i.name === 'בירות') {
      return (i.requiredStock || 0) > 0 && beerTotal < i.requiredStock;
    }
    if (i.name.startsWith('בירה ')) return false; // handled by בירות row
    const req = i.requiredStock || 0;
    return req > 0 && i.stock < req;
  });

  const alertEl = document.getElementById('lowStockAlert');
  if (!lowItems.length) { alertEl.style.display = 'none'; return; }
  alertEl.style.display = 'block';
  alertEl.innerHTML = `
    <div class="alert-strip alert-warning">
      <span>⚠️ <strong>${lowItems.length} מוצרים</strong> במלאי נמוך:</span>
      ${lowItems.map(i => {
        const actual = i.name === 'בירות' ? beerTotal : i.stock;
        return `<span class="badge badge-danger">${esc(i.name === 'בירות' ? 'בירות' : i.name)} (${actual}/${i.requiredStock})</span>`;
      }).join('')}
    </div>`;
}

/* ── Stock operations ── */
async function quickAdj(productName, delta) {
  const item = inventoryData.find(i => i.name === productName);
  if (!item) return;
  item.stock = Math.max(0, item.stock + delta);
  renderInventory();
  renderLowStockAlert();
  try {
    await apiCall('updateStock', { productName, delta, reason: 'עדכון מהיר' });
  } catch (_) { showToast('שגיאה בשמירה', 'error'); }
}

function openStockModal(productName) {
  const item = inventoryData.find(i => i.name === productName);
  editingProduct = productName;
  deltaSign = 1;
  document.getElementById('addStockTitle').textContent = 'עדכון מלאי — ' + productName;
  document.getElementById('stockDelta').value    = '';
  document.getElementById('stockReason').value  = '';
  document.getElementById('stockRequired').value = item ? (item.requiredStock || '') : '';
  document.getElementById('stockNotes').value    = item ? (item.notes || '') : '';
  // Set category dropdown
  const catEl = document.getElementById('stockCategory');
  catEl.value = item && item.category ? item.category : '';
  document.getElementById('btnPlus').className  = 'btn btn-primary';
  document.getElementById('btnMinus').className = 'btn btn-secondary';
  document.getElementById('addStockModal').classList.add('open');
}

function setDeltaSign(sign) {
  deltaSign = sign;
  document.getElementById('btnPlus').className  = sign > 0 ? 'btn btn-primary' : 'btn btn-secondary';
  document.getElementById('btnMinus').className = sign < 0 ? 'btn btn-danger'  : 'btn btn-secondary';
}

async function submitStockUpdate() {
  const rawDelta = parseInt(document.getElementById('stockDelta').value);
  const rawReq   = document.getElementById('stockRequired').value;
  const notes    = document.getElementById('stockNotes').value;
  const category = document.getElementById('stockCategory').value;
  const reason   = document.getElementById('stockReason').value.trim();
  const hasDelta = rawDelta && rawDelta > 0;
  const hasReq   = rawReq !== '';
  const hasNotes = true; // always save notes (even if empty = clear)
  const hasCat   = category !== '';

  if (!hasDelta && !hasReq && !hasCat && notes === (inventoryData.find(i => i.name === editingProduct) || {}).notes) {
    showToast('לא הוזנו שינויים', 'warning'); return;
  }
  closeModal(null, 'addStockModal');
  try {
    if (hasDelta) {
      const delta = deltaSign * rawDelta;
      const res = await apiCall('updateStock', { productName: editingProduct, delta, reason });
      if (res.success) showToast(`✓ מלאי עודכן — ${editingProduct}: ${res.newStock}`, 'success');
      else showToast('שגיאה בעדכון מלאי: ' + (res.message || ''), 'error');
    }
    if (hasReq || notes !== undefined || hasCat) {
      const params = { productName: editingProduct };
      if (hasReq) params.requiredStock = parseInt(rawReq) || 0;
      params.notes = notes;
      if (hasCat) params.category = category;
      const res = await apiCall('updateRequiredStock', params);
      if (res && res.success === false) showToast('שגיאה בעדכון: ' + (res.message || ''), 'error');
      else if (!hasDelta) showToast(`✓ פרטי מוצר עודכנו — ${editingProduct}`, 'success');
    }
    loadInventory();
  } catch (_) { showToast('שגיאת חיבור', 'error'); }
}

/* ── Add product ── */
function openAddProductModal(prefill) {
  document.getElementById('addProductTitle').textContent = '+ הוסף מוצר למלאי';
  document.getElementById('newInvProduct').value  = prefill || '';
  document.getElementById('newInvQty').value      = '0';
  document.getElementById('newInvRequired').value = '0';
  document.getElementById('newInvNotes').value    = '';
  document.getElementById('newInvCategory').value = 'אחר';
  document.getElementById('addProductModal').classList.add('open');
  if (prefill) {
    setTimeout(() => {
      const el = document.getElementById('newInvProduct');
      el.focus(); el.setSelectionRange(el.value.length, el.value.length);
    }, 150);
  }
}

function openAddBeerTypeModal() {
  openAddProductModal('בירה ');
  document.getElementById('newInvCategory').value = 'אלכוהול';
  document.getElementById('addProductTitle').textContent = '+ הוסף סוג בירה';
}

async function submitNewProduct() {
  const name     = document.getElementById('newInvProduct').value.trim();
  const qty      = parseInt(document.getElementById('newInvQty').value) || 0;
  const required = parseInt(document.getElementById('newInvRequired').value) || 0;
  const notes    = document.getElementById('newInvNotes').value.trim();
  const category = document.getElementById('newInvCategory').value || 'אחר';
  if (!name) { showToast('יש להזין שם מוצר', 'error'); return; }
  closeModal(null, 'addProductModal');
  try {
    const res = await apiCall('updateStock', { productName: name, delta: qty, reason: 'יצירה ראשונית' });
    if (res.success) {
      await apiCall('updateRequiredStock', { productName: name, requiredStock: required, notes, category });
      showToast('✓ מוצר נוסף למלאי', 'success');
      loadInventory();
    } else showToast('שגיאה: ' + (res.message || ''), 'error');
  } catch (_) { showToast('שגיאת חיבור', 'error'); }
}

function closeModal(event, id) {
  if (event && event.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
